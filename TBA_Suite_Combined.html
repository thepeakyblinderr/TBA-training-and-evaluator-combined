<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TBA Suite · IOCL — Training &amp; Evaluation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0f1117;font-family:'IBM Plex Mono',monospace}

/* ─── TOP SWITCHER BAR ─── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  height:48px;
  background:#0d1117;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;
  padding:0 20px;gap:0;
  box-shadow:0 2px 16px rgba(0,0,0,.4)
}

.top-logo{
  font-family:'Fraunces',serif;
  font-size:16px;font-weight:900;
  color:#fff;
  margin-right:24px;
  white-space:nowrap;
  display:flex;align-items:center;gap:8px
}
.top-logo-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;
  background:rgba(201,137,58,.25);
  border:1px solid rgba(201,137,58,.45);
  color:#f0c87a;
  padding:2px 7px;border-radius:3px;
  text-transform:uppercase;
}

.top-divider{
  width:1px;height:24px;
  background:rgba(255,255,255,.1);
  margin:0 16px;
}

/* ─── MODE TABS ─── */
.mode-tabs{display:flex;gap:4px}
.mode-tab{
  display:flex;align-items:center;gap:7px;
  padding:6px 16px;border-radius:5px;
  font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid transparent;
  transition:all .18s;color:rgba(255,255,255,.45);
  background:transparent;letter-spacing:.3px
}
.mode-tab:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.06)}
.mode-tab.active{
  color:#fff;background:rgba(29,111,181,.25);
  border-color:rgba(29,111,181,.5)
}
.mode-tab.tut.active{
  background:rgba(201,137,58,.2);
  border-color:rgba(201,137,58,.45);
  color:#f0c87a
}

.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-hint{
  font-size:10px;letter-spacing:.5px;
  color:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.08);
  padding:3px 10px;border-radius:3px
}

/* ─── IFRAME CONTAINER ─── */
.frame-wrap{
  position:fixed;
  top:48px;left:0;right:0;bottom:0;
  display:none
}
.frame-wrap.active{display:block}
.frame-wrap iframe{
  width:100%;height:100%;
  border:none;display:block
}

/* ─── TRANSITION OVERLAY ─── */
.switch-overlay{
  position:fixed;inset:0;
  background:#0d1117;
  z-index:9000;
  opacity:0;pointer-events:none;
  transition:opacity .18s
}
.switch-overlay.show{opacity:1;pointer-events:all}

/* ─── MODE PILL TOAST ─── */
.mode-pill{
  position:fixed;top:60px;right:20px;
  background:#1e3a5f;border:1px solid rgba(29,111,181,.4);
  color:#93c5fd;font-size:10px;font-family:'IBM Plex Mono',monospace;
  padding:6px 14px;border-radius:20px;
  z-index:8000;opacity:0;transform:translateY(-4px);
  transition:all .3s;pointer-events:none
}
.mode-pill.show{opacity:1;transform:translateY(0)}
.mode-pill.tut{background:#2c1e0a;border-color:rgba(201,137,58,.4);color:#f0c87a}
</style>
</head>
<body>

<!-- ─── TOP SWITCHER BAR ─── -->
<div class="top-bar">
  <div class="top-logo">
    TBA Suite
    <span class="top-logo-badge">IOCL</span>
  </div>
  <div class="top-divider"></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-eval" onclick="switchMode('eval')">
      <span>⚙</span>
      <span>TBA Evaluator Tool</span>
    </button>
    <button class="mode-tab tut" id="tab-tut" onclick="switchMode('tut')">
      <span>📖</span>
      <span>Setup Guide &amp; Training</span>
    </button>
  </div>
  <div class="top-right">
    <div class="top-hint">IOCL CONTRACTS DEPT</div>
  </div>
</div>

<!-- ─── IFRAME: EVALUATOR ─── -->
<div class="frame-wrap active" id="wrap-eval">
  <iframe id="frame-eval" src="evaluator.html" title="TBA Evaluator" sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-modals allow-popups"></iframe>
</div>

<!-- ─── IFRAME: TUTORIAL ─── -->
<div class="frame-wrap" id="wrap-tut">
  <iframe id="frame-tut" src="tutorial.html" title="TBA Training Guide" sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-modals allow-popups"></iframe>
</div>

<!-- ─── TRANSITION OVERLAY ─── -->
<div class="switch-overlay" id="overlay"></div>

<!-- ─── MODE PILL TOAST ─── -->
<div class="mode-pill" id="pill"></div>

<script>
let currentMode = 'eval';

function switchMode(mode) {
  if(mode === currentMode) return;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');
  setTimeout(() => {
    currentMode = mode;
    document.getElementById('wrap-eval').classList.toggle('active', mode === 'eval');
    document.getElementById('wrap-tut').classList.toggle('active', mode === 'tut');
    document.getElementById('tab-eval').classList.toggle('active', mode === 'eval');
    document.getElementById('tab-tut').classList.toggle('active', mode === 'tut');
    overlay.classList.remove('show');
    showPill(mode);
  }, 160);
}

function showPill(mode) {
  const pill = document.getElementById('pill');
  const isTut = mode === 'tut';
  pill.textContent = isTut ? '📖 Switched to Training Guide' : '⚙ Switched to Evaluator Tool';
  pill.className = 'mode-pill show' + (isTut ? ' tut' : '');
  setTimeout(() => { pill.className = 'mode-pill' + (isTut ? ' tut' : ''); }, 2200);
}

window.addEventListener('message', (e) => {
  if (!e.data || !e.data.action) return;
  if (e.data.action === 'switchToTutorial') switchMode('tut');
  if (e.data.action === 'switchToEvaluator') switchMode('eval');
});
</script>
</body>
</html>
