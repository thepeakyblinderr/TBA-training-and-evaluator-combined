<!-- STEP G: EXPORT & SAVE -->
<section id=&quot;step-export&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step G · Evaluator Tool — Export, Print &amp;amp; Save</div>
  <h2 class=&quot;section-title&quot;>Export, Print &amp;amp; Save Your Session</h2>
  <p class=&quot;section-lead&quot;>The TBA Evaluator provides four output options available from the top toolbar. Use these at appropriate stages of the evaluation.</p>

  <div class=&quot;col-map&quot;>
  <div class=&quot;col-header&quot;><span>Action</span><span>When &amp;amp; How to Use</span></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>💾 Save JSON</div><div class=&quot;col-explain&quot;>Downloads the entire session as a <strong>.json</strong> file — all tender details, PQC criteria, bidder data, WOs, verdicts, and remarks. Use this to save progress mid-evaluation and resume later. Also serves as a backup before closing the browser. Recommended: save after completing each bidder.</div></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>📂 Load JSON</div><div class=&quot;col-explain&quot;>Restores a previously saved JSON session. Use this to resume an evaluation started in a prior session, or to hand off evaluation to a colleague on a different machine. All data including verdicts and remarks is restored exactly.</div></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>📊 Export Excel</div><div class=&quot;col-explain&quot;>Exports the completed TBA in IOCL standard Excel format — suitable for official submission, filing, and DGM approval. Includes all bidder rows, WO details, executed values, verdicts, and the summary sheet. Use this to generate the final TBA document for sign-off.</div></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>🖨 Print TBA</div><div class=&quot;col-explain&quot;>Opens the browser print dialog with the TBA Format Preview pre-loaded. Use landscape orientation for best results. This produces a print-ready PDF or hard copy of the TBA for physical filing and signature.</div></div>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot;>⚠️ Session Data Is Not Automatically Saved</div>
    <p>The tool does not auto-save to the browser or any server. If you close the tab without saving JSON, all data entered in that session is lost. Develop the habit of clicking <strong>💾 Save JSON</strong> frequently — especially after each bidder is fully evaluated.</p>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot;>💡 Recommended Naming Convention for JSON Files</div>
    <p>Name your saved files systematically for easy retrieval: e.g., <code>TBA_IOCL-GD-MECH-2024-001_Initial_v1.json</code>. When you do a Final TBA after query replies, load the Initial JSON and save it as <code>_Final_v1.json</code> — maintaining a clear version trail.</p>
  </div>

<!-- STANDARD QUERIES -->
<section id=&quot;standard-queries&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Evaluator's Toolkit</div>
  <h2 class=&quot;section-title&quot;>Standard Queries to Raise When Documents Are Unclear</h2>
  <p class=&quot;section-lead&quot;>On Initial TBA, when a document is ambiguous or incomplete — but the deficiency could potentially be resolved — issue a formal query rather than outright rejecting. These are the standard query situations for this tender, with the exact clause basis and suggested wording.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-13&quot;>The Purpose of a Query</div>
    <p>A query is not a favour to the bidder — it is a procedural safeguard for the evaluator. By issuing a query, the evaluator demonstrates due diligence: that no bidder was rejected on a technicality that could have been clarified. However, a query cannot be used to allow a bidder to submit new experience, change values, or cure a substantive PQC shortfall. Queries are for clarification of what was already submitted, not for fresh submissions.</p>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-7&quot;>💡 Golden Rule on Queries</div>
    <p><strong>Query = clarify existing information.</strong> You cannot query a bidder to ask them to submit a new WO, increase a value, or add experience they did not already claim. Queries are only valid for: missing supporting documents for already-claimed experience, ambiguous values in submitted documents, and unclear descriptions that need elaboration.</p>
  </div>

  <!-- QUERY CATEGORY 1 -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Category 1 — Completion Certificate Issues</div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-19&quot;>Query Q-1A</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-19&quot;>
        <strong>When to raise:</strong> CC submitted but does not separately state the GST amount included in the executed value, making it unclear whether the value is inclusive or exclusive of GST.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(k) — CC shall separately indicate the Service Tax/GST amount, OR a separate certificate from the client shall be submitted.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;The Completion Certificate submitted for WO No. [___] dated [___] mentions an executed value of ₹[___]. It is not clear whether this value is inclusive or exclusive of GST/Service Tax. As required under NIT Cl. 24.iii.B(k), please submit either (a) a revised CC clearly mentioning the GST component, or (b) a separate certificate from the end-client confirming the GST amount included in the executed value.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-20&quot;>Query Q-1B</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-20&quot;>
        <strong>When to raise:</strong> CC submitted does not mention the completion date, making it impossible to verify whether the job falls within the 7-year qualifying period.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(b)(2) — CC must state date of completion of the job.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;The Completion Certificate for WO No. [___] does not mention the date of completion of the work. As per NIT Cl. 24.iii.B(b)(2), the Completion Certificate must state the date of completion. Please submit a revised or supplementary certificate from the end-client/EIC confirming the date of completion of the referenced job.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-21&quot;>Query Q-1C</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-21&quot;>
        <strong>When to raise:</strong> CC is issued by the main contractor (not the end-client/EIC) and no certificate from the end-user/owner is submitted to confirm knowledge of sub-contracting.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(b)(3) — for sub-contract works, a certificate from end-user/owner/consultant confirming they were informed about or permitted the sub-contracting is required.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO No. [___] appears to be a sub-contract WO issued by [main contractor name] as the main contractor. As per NIT Cl. 24.iii.B(b)(3), for sub-contract experience, the bidder must submit a certificate from the end-user/owner/consultant confirming that the main contractor had intimated them about the engagement of a sub-contractor, OR that the bidder was permitted as a sub-contractor. Please submit such a certificate for the above WO.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-22&quot;>Query Q-1D</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-22&quot;>
        <strong>When to raise:</strong> No CC submitted at all for a claimed WO, but the WO itself and a payment certificate / running account bill are submitted instead.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(b)(1) and B(b)(2) — both WO copy AND Completion Certificate are separately required as mandatory proof.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;For WO No. [___], a Completion Certificate from the end-client/EIC as required under NIT Cl. 24.iii.B(b)(2) has not been submitted. The payment certificate/RA bill submitted is not a substitute for the Completion Certificate. Please submit a Completion Certificate issued by the end-client/owner/consultant/EIC, mentioning the executed value and date of completion, as per Cl. 24.iii.B(b)(2).&quot;</em>
      </div>
    </div>
  </div>

  <!-- EVALUATOR DEBATE CALLOUT -->
  <div style=&quot;margin-top:32px;margin-bottom:8px&quot;>
    <div style=&quot;background:#1e3a5f;border-radius:6px;padding:28px 32px;position:relative;overflow:hidden&quot;>
      <div style=&quot;position:absolute;right:20px;top:-8px;font-family:var(--serif);font-size:80px;font-weight:900;color:rgba(255,255,255,.04);pointer-events:none&quot;>⚖</div>
      <div style=&quot;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;font-weight:700&quot;>⚖ Common Evaluator Debate — Read This Carefully</div>
      <div style=&quot;font-size:15px;font-weight:600;color:#f0ece4;margin-bottom:14px;line-height:1.5&quot;>&quot;The WO value is only ₹10 Lacs — there is no point asking for the CC since the executed value can never meet the SWO threshold anyway.&quot;</div>
      <div style=&quot;display:inline-block;background:rgba(185,76,46,.35);border:1px solid #f87171;color:#fee2e2;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 12px;border-radius:3px;letter-spacing:1px;margin-bottom:18px&quot;>THIS REASONING IS PROCEDURALLY INCORRECT</div>

      <div style=&quot;font-size:13px;color:#dde4f0;line-height:1.9&quot;>
        <p style=&quot;margin-bottom:12px&quot;>This is one of the most common shortcuts taken by evaluators — and it is wrong for the following reasons:</p>

        <p style=&quot;margin-bottom:10px&quot;><strong style=&quot;color:#f0c87a&quot;>1. Both documents are independently mandatory.</strong> NIT Cl. 24.iii.B(b)(1) requires the WO copy. Cl. 24.iii.B(b)(2) requires the Completion Certificate. These are not conditional on each other. The NIT does not say &quot;submit CC only if WO value looks promising.&quot; The clause is unconditional — both are required as valid proof of experience.</p>

        <p style=&quot;margin-bottom:10px&quot;><strong style=&quot;color:#f0c87a&quot;>2. WO value ≠ Executed value.</strong> A ₹10L WO could have been amended upward through Variation Orders or scope additions. You cannot assume the executed value equals the WO face value. The only document that certifies what was actually paid/completed is the CC. Pre-judging based on WO value is an assumption — not an evaluation.</p>

        <p style=&quot;margin-bottom:10px&quot;><strong style=&quot;color:#f0c87a&quot;>3. The TBA executed value column cannot be filled from a WO alone.</strong> If you don't have a CC, the &quot;Executed Value&quot; column in the TBA has no data to populate. You cannot enter the WO value as a proxy — that is factually incorrect and will not survive scrutiny.</p>

        <p style=&quot;margin-bottom:10px&quot;><strong style=&quot;color:#f0c87a&quot;>4. Skipping the query creates an uneven playing field.</strong> If you raise queries for some missing CCs but not others (even if the &quot;others&quot; are small WOs), you are applying procedure selectively. A rejected bidder can challenge this as inconsistent evaluation. Uniform procedure protects the evaluator.</p>

        <p style=&quot;margin-bottom:16px&quot;><strong style=&quot;color:#f0c87a&quot;>5. TBA General Note 2 requires all submitted WOs to be documented.</strong> &quot;In case of technical rejection, details of all submitted work orders to be given along with reason for rejection.&quot; If you silently ignore a ₹10L WO without even querying for its CC, you have no documented basis for excluding it. The correct basis — to record in Remarks — is: <em style=&quot;color:#b8d4f0&quot;>&quot;CC not submitted for WO No. [___]. Query raised. No response received / CC not submitted even after query. Executed value cannot be verified per Cl. 24.iii.B(b)(2). WO not considered.&quot;</em></p>

        <div style=&quot;background:rgba(29,122,116,.25);border-left:4px solid #2dd4bf;padding:14px 18px;border-radius:0 4px 4px 0&quot;>
          <div style=&quot;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:#5eead4;text-transform:uppercase;font-weight:700;margin-bottom:8px&quot;>✓ The Correct Approach</div>
          <p style=&quot;font-size:13px;color:#ccfbf1;line-height:1.8&quot;>Always raise Query Q-1D for every WO that has no CC — regardless of the WO value. If the bidder submits the CC and the executed value is ₹8L, record it in the TBA and mark the WO as not meeting PQC threshold. If the bidder doesn't respond, reject that specific WO for missing mandatory document. Either way, your TBA is airtight and your procedure is uniform. The extra query takes 2 minutes. The procedural protection it gives you is invaluable.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- QUERY CATEGORY 2 -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Category 2 — Similar Nature Ambiguity</div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-23&quot;>Query Q-2A</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-23&quot;>
        <strong>When to raise:</strong> WO/CC scope description is vague — mentions &quot;maintenance job&quot; or &quot;shutdown work&quot; but does not clearly state the industry type (petroleum refinery, petrochemical, etc.).<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 11.3 — similar nature requires the job to be in a qualifying industry; evidence must be verifiable from submitted documents.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;The scope of work mentioned in WO No. [___] / CC refers to [shutdown / maintenance / turnaround] work but does not clearly specify the nature of the plant/facility where the work was carried out. As per NIT Cl. 11.3, similar nature experience must be in a petroleum refinery / petrochemical plant / hydrocarbon fertilizer / hydrocarbon industry. Please submit supporting documents (e.g., client profile, plant description, scope elaboration) to establish that the job site qualifies as one of the above industry types.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-24&quot;>Query Q-2B</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-24&quot;>
        <strong>When to raise:</strong> WO covers a composite scope (both similar and non-similar work) and the CC gives a single executed value without bifurcating the similar-nature portion.<br/><br/>
        <strong>Clause basis:</strong> TBA General Note 4 — only the executed value matching the similar nature of job shall be entered.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO No. [___] appears to include scope beyond the similar nature defined in NIT Cl. 11.3 (e.g., civil works / non-shutdown maintenance). The Completion Certificate provides a composite executed value of ₹[___] without bifurcation. Please submit a certificate from the end-client/EIC separately confirming the executed value attributable specifically to the shutdown / turnaround / qualifying scope of work, for consideration under NIT Cl. 11.2 and TBA Note 4.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-25&quot;>Query Q-2C</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-25&quot;>
        <strong>When to raise:</strong> Equipment type is not mentioned — the CC describes &quot;shutdown job at refinery&quot; but doesn't specify whether it involved heat exchangers, columns/vessels, furnace, or piping as required by Cl. 11.3.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 11.3 — similar nature must include maintenance of heat exchangers, columns/vessels, furnace, or hot job works with CS/SS/AS piping.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;The submitted WO/CC for WO No. [___] describes a shutdown job at [plant/refinery name] but does not specify the type of equipment maintained. As per NIT Cl. 11.3, the qualifying scope must include maintenance of heat exchangers, columns/vessels, furnace, or hot job works with CS/SS/AS piping. Please submit the Schedule of Rates / Scope of Work document or a clarification letter from the client specifying the equipment/activities carried out during the shutdown.&quot;</em>
      </div>
    </div>
  </div>

  <!-- QUERY CATEGORY 3 -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Category 3 — Work Order Date &amp;amp; Period Issues</div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-26&quot;>Query Q-3A</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-26&quot;>
        <strong>When to raise:</strong> WO was issued before the 7-year qualifying window, but it is not clear from the CC whether the job was completed within the qualifying period.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(a) — WO issued before qualifying period is acceptable IF the job was completed/in progress during the qualifying period (irrespective of WO issue date).<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO No. [___] was issued on [date], which is outside the 7-year qualifying period from [qualifying period start]. However, as per NIT Cl. 24.iii.B(a), WOs issued prior to the qualifying period may still be considered if the job was completed or was in progress during the qualifying period. The submitted CC does not clearly state the date of completion. Please submit a Completion Certificate or documentary evidence confirming that work under WO No. [___] was completed or in progress on or after [qualifying period start date].&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-27&quot;>Query Q-3B</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-27&quot;>
        <strong>When to raise:</strong> WO value is stated in a foreign currency and the bidder has not provided the conversion rate or the converted INR value.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(n) — foreign currency WO values to be converted to INR at SBI bill selling rate on the date of WO issue.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO No. [___] states the contract value in [currency name]. As per NIT Cl. 24.iii.B(n), the value must be converted to INR at the SBI bill selling rate on the date of WO issue (i.e., [WO issue date]). Please submit: (a) the SBI bill selling rate for [currency] on [WO date] with supporting evidence (e.g., RBI/SBI exchange rate statement), and (b) the resulting converted INR value for the executed amount as per the CC.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-28&quot;>Query Q-3C</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-28&quot;>
        <strong>When to raise:</strong> A WO submitted for PQC experience shows the job as <em>under execution / running</em> at the time of bid submission — the bidder has not submitted a Completion Certificate because the contract period stated in the WO had not expired. However, the WO was issued some time ago and it is possible the job has since been completed; the bidder may simply have forgotten to submit the updated CC.<br/><br/>
        <strong>Why this matters:</strong> A running WO without a CC cannot be evaluated — there is no executed value to compare against the PQC threshold. However, outright exclusion without a query would be unfair if the job was in fact completed. The evaluator's duty is to seek clarification, not to assume either way.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 24.iii.B(b)(2) — CC required with executed value and date of completion. NIT Cl. 24.iii.B(a) — qualifying period reckoned from completion date.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO No. [___] dated [___] submitted in support of PQC experience appears to be under execution / the contractual period had not expired as of the bid submission date, and no Completion Certificate has been submitted. If this work has since been completed, please submit a Completion Certificate from the end-client/EIC confirming: (a) the date of completion, (b) the executed value inclusive of GST, and (c) reference to the above WO. If the work is still ongoing and a CC cannot be submitted, please confirm the same in writing — the WO will not be considered for PQC evaluation as executed value cannot be verified per NIT Cl. 24.iii.B(b)(2).&quot;</em>
      </div>
    </div>

    <div class=&quot;tip&quot;>
      <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-8&quot;>💡 Key Concept — Running WO: Query First, Decide After</div>
      <p>A WO marked as &quot;under execution&quot; is not automatically disqualified — it is a <strong>queryable deficiency</strong>. Consider what is actually possible:</p>
      <ul style=&quot;margin:10px 0 0 18px;line-height:1.9&quot;>
        <li><strong>Job completed, bidder forgot to attach CC</strong> — The most common scenario. A query gives them one fair opportunity to submit the CC. After receiving it, evaluate normally on executed value and completion date.</li>
        <li><strong>Job genuinely still running</strong> — If the bidder confirms this in response to the query, the WO cannot be considered. No executed value exists and the work is not &quot;completed&quot; per Cl. 11.2.</li>
        <li><strong>CC received but completion date outside qualifying period</strong> — WO is ineligible. Exclude with clause reference recorded in Remarks.</li>
        <li><strong>CC received and completion date within qualifying period</strong> — Evaluate on executed value from CC exactly as any other WO.</li>
      </ul>
      <p style=&quot;margin-top:12px&quot;>Never silently exclude a running WO without raising a query — doing so deprives the bidder of a fair opportunity and creates a procedural vulnerability if the decision is later challenged.</p>
    </div>
  </div>


  <!-- QUERY CATEGORY 4 -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Category 4 — EMD / BG Issues</div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-29&quot;>Query Q-4A</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-29&quot;>
        <strong>When to raise:</strong> EMD Bank Guarantee submitted but validity period is less than 7 months from the bid submission date, or the SFMS message details do not match the required field values.<br/><br/>
        <strong>Clause basis:</strong> NIT Cl. 10 — BG validity period and SFMS field values (beneficiary name, bank branch, IFSC code, reference code) are specified in each NIT and must be complied with exactly.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;The EMD Bank Guarantee submitted has a validity of [stated validity], which is less than 7 months from the bid submission date of [date] as required under NIT Cl. 10. Please submit a revised/extended BG valid up to at least [required expiry date]. Additionally, confirm that the SFMS transmission for the BG has been made with the SFMS fields match the values specified in NIT Cl. 10 of the tender being evaluated.&quot;</em>
      </div>
    </div>
  </div>

  <!-- QUERY CATEGORY 6: NIT-SPECIFIC SPECIAL PROVISIONS -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Category 5 — NIT-Specific Special Provisions (Alternate Document Routes)</div>

    <div class=&quot;rationale&quot;>
      <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-14&quot;>What are special provisions and why do they exist?</div>
      <p>Not every IOCL tender is identical. Some NITs include <strong>additional sub-clauses under Cl. 24.iii.B(b)</strong> that create alternate document routes for specific types of work where a standard Completion Certificate may not be the norm — for example, supply-only contracts, equipment installation jobs, or highly specialised scopes where the industry practice is to certify delivery rather than completion. These provisions recognise that the strict CC requirement, while appropriate for most service contracts, can be impractical for certain niche WO types. The key principle: <strong>the alternate route still requires proof of execution — it only changes the form that proof takes.</strong></p>
    </div>

    <div style=&quot;background:#1e3a5f;border-radius:6px;padding:24px 28px;margin:20px 0&quot;>
      <div style=&quot;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;font-weight:700&quot;>📋 The Evaluator's First Step — Always Read the Entire NIT</div>
      <p style=&quot;font-size:14px;color:#dde4f0;line-height:1.8;margin-bottom:12px&quot;>Before beginning any TBA evaluation, read <strong style=&quot;color:#f0c87a&quot;>Cl. 24.iii.B(b) in full</strong> in the specific NIT you are working on. Do not assume the document requirements are identical to the last tender you evaluated. Special provisions are tender-specific — they appear only when the NIT drafter has included them for a reason relevant to that particular scope of work.</p>
      <p style=&quot;font-size:14px;color:#dde4f0;line-height:1.8&quot;>Ask yourself three questions as you read:</p>
      <ol style=&quot;margin:12px 0 0 20px;font-size:13px;color:#b8d4f0;line-height:2&quot;>
        <li>Does this NIT have any sub-clauses beyond the standard (1), (2), (3), (4)?</li>
        <li>If yes — what specific WO/work type does each special provision apply to?</li>
        <li>Has the bidder submitted a WO that could fall under one of these special provisions?</li>
      </ol>
    </div>

    <div class=&quot;tip&quot;>
      <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-9&quot;>💡 How Special Provisions Typically Work</div>
      <p>A special provision usually has the following structure in the NIT: <em>&quot;In case the bidder has submitted WO/PO pertaining to [specific work type], any one of the following documents may be considered as valid proof…&quot;</em> followed by a list of alternate documents. The pattern is consistent even if the specific work type and documents vary. Once you recognise this pattern, you can apply the same evaluation logic regardless of which special provision you encounter.</p>
    </div>

    <div style=&quot;margin-top:24px&quot;>
      <div class=&quot;how-to-title&quot; style=&quot;font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--border)&quot;>Universal evaluation approach for any special provision</div>
      <ol class=&quot;step-list&quot;>
        <li><strong>Confirm the provision exists in this NIT.</strong> Never apply a special provision from memory or from a previous tender. Find it in the current NIT and read it verbatim. If it is not there, the standard CC route applies without exception.</li>
        <li><strong>Confirm the WO actually falls within the scope of the provision.</strong> Special provisions are narrow — they apply to a defined WO type only. Read the WO/PO description and verify it matches the specific scope described in the provision. When in doubt, treat it as a standard WO requiring a CC.</li>
        <li><strong>Check what the provision permits as alternate proof.</strong> Identify the list of acceptable alternate documents. Note whether any one document suffices or whether a combination is required (typically: the WO/PO copy PLUS one alternate proof of execution).</li>
        <li><strong>Verify the alternate document actually proves execution.</strong> The purpose of a CC is to confirm the work was done and certify the value. Whatever alternate document is submitted must serve the same purpose — it must establish what was executed and at what value. A document that only proves the order was placed (not executed) is not sufficient under any route.</li>
        <li><strong>Check if a catch-all &quot;any other document&quot; option exists.</strong> Many such provisions include a final option allowing &quot;any other document&quot; submitted by the bidder — subject to IOCL's scrutiny. This is not a blank cheque. It requires active evaluation and, given its discretionary nature, should be escalated to your checking officer before acceptance. Document your reasoning in Remarks.</li>
        <li><strong>Record the specific provision applied in the TBA Remarks.</strong> Do not just write &quot;documents verified.&quot; State which sub-clause was applied, which document was accepted, and what value was established. This creates a clear audit trail.</li>
      </ol>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-30&quot;>Query Q-5A</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-30&quot;>
        <strong>When to raise:</strong> A special provision exists in the NIT for the type of WO submitted by the bidder, but the bidder has only submitted the WO/PO copy — without any of the alternate execution proof documents listed in the provision.<br/><br/>
        <strong>Clause basis:</strong> The relevant special sub-clause of Cl. 24.iii.B(b) in the current NIT — the WO/PO copy alone is never sufficient proof of execution under any route.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;WO/PO No. [___] dated [___] pertaining to [describe work type as per NIT special provision] has been submitted. As per NIT Cl. 24.iii.B(b)[sub-clause no.], in addition to the WO/PO copy, proof of execution in the form of [list the alternate documents permitted by the provision] must also be submitted. No such accompanying document establishing execution has been found in your submission. Please submit the appropriate document(s) as listed in NIT Cl. 24.iii.B(b)[sub-clause no.] at the earliest.&quot;</em>
      </div>
    </div>

    <div class=&quot;clause-cite&quot;>
      <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-31&quot;>Query Q-5B</div>
      <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-31&quot;>
        <strong>When to raise:</strong> The bidder has submitted a &quot;catch-all&quot; or &quot;any other document&quot; as their alternate proof of execution, but it is vague, undated, or does not clearly establish the executed value or the nature/scope of the work.<br/><br/>
        <strong>Clause basis:</strong> The catch-all option in most special provisions is explicitly conditional on being &quot;properly checked by IOCL&quot; — giving the evaluator the authority and obligation to seek clarification.<br/><br/>
        <strong>Suggested query wording:</strong><br/>
        <em>&quot;In support of WO/PO No. [___], you have submitted [document name/type] as alternate proof of execution. However, this document does not clearly establish: (a) the value of work actually executed/delivered, and/or (b) confirmation that the scope described in the WO/PO was completed. Please submit a supplementary document from the client or a more specific document that confirms the executed value and the nature/scope of work completed, for IOCL's proper verification as required under NIT Cl. 24.iii.B(b)[sub-clause no.].&quot;</em>
      </div>
    </div>

    <div class=&quot;pitfall&quot;>
      <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-8&quot;>⚠️ Critical Mistakes to Avoid with Special Provisions</div>
      <ul>
        <li><strong>Applying a provision from a different tender</strong> — Special provisions are NIT-specific. Just because a provision existed in the last tender you evaluated does not mean it exists here. Always verify in the current NIT before applying.</li>
        <li><strong>Applying a provision to a WO type it was not designed for</strong> — Read the scope described in the provision carefully. If the bidder's WO is different from what the provision covers, the standard CC route applies. Do not stretch the provision's applicability.</li>
        <li><strong>Accepting WO/PO alone as sufficient proof</strong> — Under every route — standard or special — a WO/PO copy establishes only that an order was placed. Proof of execution is always required in addition. No provision removes this requirement; it only changes the form the proof must take.</li>
        <li><strong>Rubber-stamping the &quot;any other document&quot; option</strong> — When a provision allows &quot;any other document,&quot; it is invariably conditioned on proper checking by IOCL. This is an active duty of scrutiny, not a passive acceptance. If you cannot clearly establish executed value and scope from the document, raise Query Q-5B and escalate to your checking officer.</li>
        <li><strong>Not recording the specific provision applied in Remarks</strong> — If you accept a WO under a special provision without recording which sub-clause and which alternate document was relied upon, there is no audit trail. Any subsequent scrutiny — audit, vigilance, court — will question how the acceptance was justified.</li>
      </ul>
    </div>
  </div>

  <!-- WHAT CANNOT BE QUERIED -->
  <div style=&quot;margin-top:32px&quot;>
    <div class=&quot;pitfall&quot;>
      <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-9&quot;>🚫 What CANNOT Be Queried — Must Lead to Rejection</div>
      <ul>
        <li><strong>Executed value is simply below PQC threshold</strong> — If the bidder's best similar-nature executed value is below the minimum SWO slab under all three options, this is a substantive shortfall. No query can fix it; reject with clause reference.</li>
        <li><strong>No similar-nature WO submitted at all</strong> — Cannot query a bidder to submit new experience WOs they did not include in their original bid.</li>
        <li><strong>Job site is clearly a non-qualifying industry</strong> — If the WO is from a steel plant or cement factory, no clarification can change the industry type; reject under Cl. 11.3.</li>
        <li><strong>Sub-contracting arrangement for current job</strong> — If a bidder indicates they will sub-contract work under this tender, this violates Cl. 23.i and is grounds for immediate rejection; cannot be cured by query.</li>
        <li><strong>Deviation to GCC/SCC submitted</strong> — NIT Cl. 23.e explicitly states deviations are not permitted. A bidder cannot withdraw their deviation through a query; the offer is non-compliant.</li>
        <li><strong>EMD not submitted at all</strong> — Missing EMD (unless bidder is exempt under Cl. 10 as MSE/DPIIT/PSU) is not a queryable deficiency; the bid is liable for rejection.</li>
      </ul>
    </div>
  </div>

</section>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-11&quot;>💡 Key Concept — Reading &quot;Repair and Maintenance of Civil Works&quot;</div>
    <p>The Cl. 11.3 definition has two limbs separated by a slash: <strong>&quot;Repair and maintenance of civil works / Civil construction works.&quot;</strong> The slash means <em>either</em> limb qualifies independently.</p>
    <p style=&quot;margin-top:12px&quot;>Within the first limb, <strong>&quot;repair and maintenance&quot;</strong> is a compound phrase describing a single recognised category of civil work — it does not mean a WO must contain both repair activities and maintenance activities simultaneously. In practice:</p>
    <ul style=&quot;margin:10px 0 0 18px;line-height:1.8&quot;>
      <li><strong>Repair works only</strong> (e.g., WO for repair of roads and drains) → <strong>Qualifies</strong> — repair is within the &quot;repair and maintenance&quot; category.</li>
      <li><strong>Maintenance works only</strong> (e.g., WO for annual maintenance of civil infrastructure) → <strong>Qualifies</strong> — maintenance is within the &quot;repair and maintenance&quot; category.</li>
      <li><strong>Both repair and maintenance together</strong> → Also qualifies.</li>
    </ul>
    <p style=&quot;margin-top:12px&quot;><strong>Conceptual distinction:</strong> <em>Repair</em> is corrective — restoring something that has deteriorated or failed (e.g., patching a broken road, fixing a cracked drain). <em>Maintenance</em> is preventive — upkeep to prevent deterioration (e.g., repainting, clearing drainage, periodic inspection and minor works). Both fall under the same category of civil work in any industrial facility, and IOCL's definition groups them together deliberately: contractors who do one routinely do the other. A WO describing either activity at a qualifying industry is sufficient — do not reject a WO simply because it says &quot;repair&quot; without using the word &quot;maintenance,&quot; or vice versa.</p>
    <p style=&quot;margin-top:12px&quot;><strong>What to watch for:</strong> The WO scope must clearly indicate <em>civil works</em> — e.g., roads, pavements, drains, structures, buildings, RCC works. A WO described only as &quot;housekeeping,&quot; &quot;cleaning,&quot; or &quot;painting&quot; without reference to civil works does not qualify even if executed at a petroleum refinery.</p>
  </div>

    <div class=&quot;how-to-title&quot; style=&quot;color:#c0392b&quot;>Evaluation — Two Issues, One Fatal</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Sub-contracting in Current Bid:</strong> NIT Cl. 23.j explicitly states: &quot;Sub-contracting not permitted in this job.&quot; The bidder's method statement indicates engagement of &quot;XYZ Specialist Agency.&quot; This is an unacceptable condition. Per NIT Cl. 24.v.B(c), a bid stipulating conditions not acceptable to IOCL is liable for rejection. This is not a queryable deficiency — the bidder has introduced a condition that directly contradicts the NIT. <strong>Bid is non-compliant.</strong></li>
      <li><strong>Sub-contract Experience WO (Note — for completeness):</strong> Even if Issue 1 were somehow resolved, the sub-contract WO (Issue 2) for experience: similar nature ✅ (civil maintenance, BPCL Petrochemical), CC ✅, end-user cert ✅. Executed value ₹115 Lacs &amp;gt; ₹109.24 Lacs Option 1 threshold ✅. The experience documents are actually in order — but the bid itself is non-compliant on sub-contracting grounds.</li>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-13&quot;>⚠️ Key Learning — Sub-contracting: Experience vs Current Bid</div>
    <p>There are two distinct sub-contracting questions in every TBA: (1) Does the bidder's <em>experience</em> come from sub-contract work? (This is about their PQC documents — and is acceptable per Cl. 11.2, subject to end-user certificate.) (2) Does the bidder propose to <em>sub-contract the current job</em>? (This is about compliance with NIT Cl. 23.j — and when prohibited, it makes the bid non-compliant regardless of experience quality.) These are completely independent questions with different consequences. Confusing the two is a common evaluator error.</p>
  </div>

<section id=&quot;nit-quick-ref&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Reference Card</div>
  <h2 class=&quot;section-title&quot;>NIT Key Parameters — What to Look For in Every NIT</h2>
  <p class=&quot;section-lead&quot;>This table lists every key clause you must check in any IOCL service contract NIT. Use it as a structured checklist when reading a new NIT before starting the TBA.</p>

  <table class=&quot;data-table&quot;>
    <thead><tr><th>NIT Clause</th><th>Parameter</th><th>What to Find / How to Read It</th></tr></thead>
    <tbody>
      <tr><td>Cl. 1</td><td>Tender No.</td><td>Copy verbatim from the NIT cover page — links TBA to the specific tender</td></tr>
      <tr><td>Cl. 2b</td><td>Bid System</td><td>Two-Bid System — Techno-commercial evaluated first; price bid opened only after TBA clearance</td></tr>
      <tr><td>Cl. 4</td><td>Contract Validity</td><td>[As per NIT — typically months from WO issue date]</td></tr>
      <tr><td>Cl. 4</td><td>Contract Period / Shutdown Periods</td><td>Read carefully — for shutdown contracts, PRC typically applies only to engineering days, not total shutdown period. Note each period separately.</td></tr>
      <tr><td>Cl. 10</td><td>EMD</td><td>[As per NIT Cl. 10 — varies by estimated cost]</td></tr>
      <tr><td>Cl. 10</td><td>BG validity</td><td>[As per NIT Cl. 10 — typically 6–7 months from bid submission date; verify SFMS fields specified in NIT]</td></tr>
      <tr><td>Cl. 11.1</td><td>Annual Turnover (ATO)</td><td>[As per NIT Cl. 11.1 — typically 2× estimated annual cost]</td></tr>
      <tr><td>Cl. 11.2</td><td>SWO — 1 job</td><td>[As per NIT Cl. 11.2 Option 1 — incl. GST]</td></tr>
      <tr><td>Cl. 11.2</td><td>SWO — 2 jobs</td><td>[As per NIT Cl. 11.2 Option 2 — incl. GST]</td></tr>
      <tr><td>Cl. 11.2</td><td>SWO — 3 jobs</td><td>[As per NIT Cl. 11.2 Option 3 — incl. GST]</td></tr>
      <tr><td>Cl. 11.2</td><td>Qualifying period</td><td>Last 7 years — always from <strong>original</strong> bid submission date, even if date was extended (Cl. 11.2 Note 2)</td></tr>
      <tr><td>Cl. 12</td><td>Additional Technical PQC</td><td>Check NIT Cl. 12 — may or may not apply; write N/A only if explicitly stated so in NIT</td></tr>
      <tr><td>Cl. 21</td><td>ARC/Non-ARC</td><td>Check NIT Cl. 21 — ARC requires annualisation of executed values; Non-ARC / One-Time does not</td></tr>
      <tr><td>Cl. 22</td><td>Job Nature</td><td>Check NIT Cl. 22 — Critical jobs have no PQC relaxation for MSE/Startups; Non-Critical jobs may allow relaxation</td></tr>
      <tr><td>Cl. 23.a</td><td>Contract Type</td><td>[As per NIT Cl. 23.a — determines GST applicability and labour component]</td></tr>
      <tr><td>Cl. 23.d</td><td>Labour component</td><td>[As per NIT Cl. 23.d — varies by tender; relevant for GST calculation]</td></tr>
      <tr><td>Cl. 23.d</td><td>GST Rate / SAC</td><td>[As per NIT Cl. 23.d — verify GST rate and SAC code for each tender]</td></tr>
      <tr><td>Cl. 23.e</td><td>Deviation to GCC/SCC</td><td>Check NIT Cl. 23.e — if not permitted, any bid with deviations to GCC/SCC is non-compliant</td></tr>
      <tr><td>Cl. 23.g</td><td>Security Deposit (SD)</td><td>[As per NIT Cl. 23.g — verify exact % and whether ISD provision applies]</td></tr>
      <tr><td>Cl. 23.g</td><td>Initial SD (ISD)</td><td>[As per NIT Cl. 23.g — ISD collected initially, balance SD on WO award]</td></tr>
      <tr><td>Cl. 23.i</td><td>Sub-contracting</td><td>Check NIT Cl. 23.i — if not permitted, any bid indicating sub-contracting for current job is liable for rejection</td></tr>
    </tbody>
  </table>
</section>

    };
    Object.entries(clOverrides).forEach(([id, override])=>{
      const origNum = DEFAULT_CLAUSE_IDS[id];
      if(!origNum) return;
      // Find all .clause-num elements with this text and update them + sibling .clause-text
      document.querySelectorAll('.clause-num').forEach(numEl=>{
        if(numEl.textContent.trim() === origNum){
          if(override.num) numEl.textContent = override.num;
          const textEl = numEl.nextElementSibling;
          if(textEl &amp;&amp; textEl.classList.contains('clause-text') &amp;&amp; override.text){
            // Preserve inner bold/em tags by only updating text nodes if possible
            // For safety, use a wrapped span approach
            textEl.innerHTML = override.text.replace(/\n/g,'<br/>');
          }
        }
      });
    });
  }catch(e){}

  // 2. Query overrides — update query clause-cite blocks
  try{
    const qOverrides = JSON.parse(localStorage.getItem('tba_admin_queries')||'{}');
    Object.entries(qOverrides).forEach(([id, override])=>{
      // Find the clause-num element with this query ID
      document.querySelectorAll('.clause-num').forEach(numEl=>{
        if(numEl.textContent.trim() === id){
          if(override.id) numEl.textContent = override.id;
          const textEl = numEl.nextElementSibling;
          if(textEl &amp;&amp; textEl.classList.contains('clause-text')){
            textEl.innerHTML =
              '<strong>When to raise:</strong> ' + (override.when||'') +
              '<br/><br/><strong>Clause basis:</strong> ' + (override.basis||'') +
              '<br/><br/><strong>Suggested query wording:</strong><br/>' +
              '<em>&quot;' + (override.wording||'') + '&quot;</em>';
          }
        }
      });
    });
  }catch(e){}
})();

function updateProgressUI(readArr){
  const total=MARKABLE_SECTIONS.length;
  const done=readArr.length;
  const pct=total>0?Math.round((done/total)*100):0;
  const fill=document.getElementById('sidebar-prog-fill');
  const n=document.getElementById('sidebar-prog-n');
  const tot=document.getElementById('sidebar-prog-total');
  if(fill) fill.style.width=pct+'%';
  if(n) n.textContent=done;
  if(tot) tot.textContent=total;
}

function applyReadState(){
  const readArr=loadReadState();
  MARKABLE_SECTIONS.forEach(id=>{
    const sec=document.getElementById(id);
    if(!sec) return;
    const btn=sec.querySelector('.mar-btn');
    const badge=sec.querySelector('.section-read-badge');
    const navLink=document.querySelector(`.nav-item[href=&quot;#${id}&quot;]`);
    const isDone=readArr.includes(id);
    if(btn){
      btn.classList.toggle('done',isDone);
      btn.querySelector('.mar-icon').textContent=isDone?'✓':'○';
      const lbl=btn.querySelector('.mar-label');
      if(lbl) lbl.textContent=isDone?' Marked as Read':' Mark as Read';
    }
    if(badge) badge.style.display=isDone?'flex':'none';
    sec.classList.toggle('is-read',isDone);
    if(navLink) navLink.classList.toggle('nav-done',isDone);
  });
  updateProgressUI(readArr);
}

function toggleRead(id){
  let arr=loadReadState();
  if(arr.includes(id)){
    arr=arr.filter(x=>x!==id);
  } else {
    arr.push(id);
  }
  saveReadState(arr);
  applyReadState();
}

let qState={current:0,score:0,answered:false};

function renderQuiz(){
  const area=document.getElementById('quiz-area');
  const prog=document.getElementById('qprog');
  if(qState.current>=QUESTIONS.length){
    const pct=Math.round((qState.score/QUESTIONS.length)*100);
    let grade=pct>=90?'🏆 Outstanding':'';
    grade=grade||(pct>=70?'✅ Good Understanding':'');
    grade=grade||(pct>=50?'📖 Keep Studying':'❌ Revisit Training Material');
    prog.style.width='100%';
    area.innerHTML=`<div class=&quot;final-score&quot;>
      <div class=&quot;big&quot;>${qState.score}/${QUESTIONS.length}</div>
      <div class=&quot;msg&quot;>${pct}% · ${grade}</div>
      <div style=&quot;margin-top:32px;display:flex;gap:12px;justify-content:center&quot;>
        <button class=&quot;btn btn-gold&quot; onclick=&quot;qState={current:0,score:0,answered:false};renderQuiz()&quot;>Retake Quiz</button>
        <button class=&quot;btn btn-outline&quot; onclick=&quot;window.scrollTo({top:0,behavior:'smooth'})&quot;>Back to Top</button>
      </div>
    </div>`;
    return;
  }
  const q=QUESTIONS[qState.current];
  prog.style.width=((qState.current/QUESTIONS.length)*100)+'%';
  area.innerHTML=`<div class=&quot;q-card&quot;>
    <div class=&quot;q-number&quot;>Question ${qState.current+1} of ${QUESTIONS.length} · Clause: ${q.clause}</div>
    <div class=&quot;q-text&quot;>${q.q}</div>
    <div class=&quot;q-opts&quot;>
      ${q.opts.map((o,i)=>`<button class=&quot;q-opt&quot; id=&quot;qo${i}&quot; onclick=&quot;answerQ(${i})&quot;>${String.fromCharCode(65+i)}. ${o}</button>`).join('')}
    </div>
    <div class=&quot;q-explanation&quot; id=&quot;qexp&quot;></div>
    <div class=&quot;quiz-nav&quot;>
      <div class=&quot;quiz-score&quot;>Score: ${qState.score} / ${qState.current}</div>
      <div id=&quot;qnext&quot; style=&quot;display:none;margin-left:auto&quot;>
        <button class=&quot;btn btn-gold&quot; onclick=&quot;qState.current++;qState.answered=false;renderQuiz()&quot;>${qState.current<QUESTIONS.length-1?'Next Question →':'See Results'}</button>
      </div>
    </div>
  </div>`;
}

function answerQ(chosen){
  if(qState.answered)return;
  qState.answered=true;
  const q=QUESTIONS[qState.current];
  const correct=chosen===q.ans;
  if(correct)qState.score++;
  document.querySelectorAll('.q-opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.ans)b.classList.add('correct');
    else if(i===chosen&amp;&amp;!correct)b.classList.add('wrong');
  });
  const exp=document.getElementById('qexp');
  exp.className=`q-explanation show`;
  exp.innerHTML=`<strong>${correct?'✅ Correct!':'❌ Incorrect.'}</strong> ${q.exp}`;
  document.getElementById('qnext').style.display='block';
}

const CMS_KEY = 'tba_cms_overrides';

// ── SHA-256 helper ──
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Default password hash (SHA-256 of &quot;iocl@admin&quot;) ──
// Pre-computed: a69c7f3f5cde... we compute on first load
let ADMIN_PW_HASH = localStorage.getItem(CMS_PW_KEY) || null;
(async () => {
  if (!ADMIN_PW_HASH) {
    ADMIN_PW_HASH = await sha256('iocl@admin');
    // Don't store default — only store if user changes it
  }
})();

// ── Save all changes ──
function saveAllAdminChanges() {
  const overrides = cmsLoad();

  // Save clause edits
  document.querySelectorAll('[id^=&quot;adm-cn-&quot;]').forEach(inp => {
    const idx = inp.id.replace('adm-cn-', '');
    const val = inp.value.trim();
    const origEl = document.querySelector(`[data-cms-id=&quot;clause-num-${idx}&quot;]`);
    const orig = origEl ? origEl.getAttribute('data-cms-original') || origEl.innerHTML : '';
    if (val &amp;&amp; val !== (origEl ? origEl.innerHTML : '')) {
      overrides['clause-num-' + idx] = val;
    }
  });
  document.querySelectorAll('[id^=&quot;adm-ct-&quot;]').forEach(ta => {
    const idx = ta.id.replace('adm-ct-', '');
    const val = ta.value.trim();
    if (val) overrides['clause-text-' + idx] = val;
  });

  // Save query text edits
  document.querySelectorAll('[id^=&quot;adm-qt-&quot;]').forEach(ta => {
    const idx = ta.id.replace('adm-qt-', '');
    const val = ta.value.trim();
    if (val) overrides['clause-text-' + idx] = val;
  });

  // Save callout edits
  document.querySelectorAll('[id^=&quot;adm-co-inp-&quot;]').forEach(inp => {
    const id = inp.id.replace('adm-co-inp-', '');
    const val = inp.value.trim();
    if (val) overrides[id] = val;
  });

  // Save stat edits
  [1,2,3,4].forEach(i => {
    const nInp = document.getElementById(`adm-sn-stat-${i}-n`);
    const lInp = document.getElementById(`adm-sl-stat-${i}-l`);
    if (nInp &amp;&amp; nInp.value.trim()) overrides[`stat-${i}-n`] = nInp.value.trim();
    if (lInp &amp;&amp; lInp.value.trim()) overrides[`stat-${i}-l`] = lInp.value.trim();
  });

  cmsSave(overrides);
  cmsApplyAll();
  updateOverrideCount(overrides);
  buildAdminUI();

  const notice = document.getElementById('admin-save-notice');
  notice.style.display = 'block';
  setTimeout(() => notice.style.display = 'none', 3500);
}

// ── Reset individual items ──
function resetClause(idx) {
  const overrides = cmsLoad();
  delete overrides['clause-num-' + idx];
  delete overrides['clause-text-' + idx];
  cmsSave(overrides);
  // Restore original
  const origNum = document.querySelector(`[data-cms-id=&quot;clause-num-${idx}&quot;]`);
  const origText = document.querySelector(`[data-cms-id=&quot;clause-text-${idx}&quot;]`);
  if (origNum) { document.getElementById('adm-cn-' + idx).value = origNum.innerHTML; }
  if (origText) { const ta = document.getElementById('adm-ct-' + idx); if (ta) ta.value = origText.innerHTML; }
  updateOverrideCount(overrides);
}
function resetQueryText(idx) {
  const overrides = cmsLoad();
  delete overrides['clause-text-' + idx];
  cmsSave(overrides);
  const origText = document.querySelector(`[data-cms-id=&quot;clause-text-${idx}&quot;]`);
  if (origText) { const ta = document.getElementById('adm-qt-' + idx); if (ta) ta.value = origText.innerHTML; }
  updateOverrideCount(overrides);
}
function resetCallout(id) {
  const overrides = cmsLoad();
  delete overrides[id];
  cmsSave(overrides);
  const orig = document.querySelector(`[data-cms-id=&quot;${id}&quot;]`);
  if (orig) { const inp = document.getElementById('adm-co-inp-' + id); if (inp) inp.value = orig.innerHTML; }
  updateOverrideCount(overrides);
}
function resetStat(nId, lId) {
  const overrides = cmsLoad();
  delete overrides[nId]; delete overrides[lId];
  cmsSave(overrides);
  const nEl = document.querySelector(`[data-cms-id=&quot;${nId}&quot;]`);
  const lEl = document.querySelector(`[data-cms-id=&quot;${lId}&quot;]`);
  const nInp = document.getElementById('adm-sn-' + nId);
  const lInp = document.getElementById('adm-sl-' + lId);
  if (nEl &amp;&amp; nInp) { nInp.value = nEl.textContent; document.getElementById('adm-stat-preview-' + nId).textContent = nEl.textContent; }
  if (lEl &amp;&amp; lInp) lInp.value = lEl.textContent;
  updateOverrideCount(overrides);
}

// ── Export / Import config ──
function exportAdminConfig() {
  const data = cmsLoad();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tba_cms_config_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importAdminConfig() {
  document.getElementById('admin-import-file').click();
}
function doImportConfig(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      cmsSave(data);
      cmsApplyAll();
      buildAdminUI();
      alert('Config imported successfully. ' + Object.keys(data).length + ' overrides loaded.');
    } catch(err) {
      alert('Invalid config file. Please check the JSON format.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── Change password ──
async function changeAdminPassword() {
  const current = document.getElementById('pw-current').value;
  const newPw = document.getElementById('pw-new').value;
  const confirm = document.getElementById('pw-confirm').value;
  const msgEl = document.getElementById('pw-msg');

  const currentHash = await sha256(current);
  const stored = localStorage.getItem(CMS_PW_KEY) || await sha256('iocl@admin');

  if (currentHash !== stored) {
    msgEl.style.display = 'block';
    msgEl.style.background = 'rgba(185,76,46,.2)';
    msgEl.style.color = '#f87171';
    msgEl.style.border = '1px solid rgba(185,76,46,.3)';
    msgEl.textContent = '✕ Current password is incorrect.';
    return;
  }
  if (newPw.length < 6) {
    msgEl.style.display = 'block';
    msgEl.style.background = 'rgba(185,76,46,.2)';
    msgEl.style.color = '#f87171';
    msgEl.style.border = '1px solid rgba(185,76,46,.3)';
    msgEl.textContent = '✕ New password must be at least 6 characters.';
    return;
  }
  if (newPw !== confirm) {
    msgEl.style.display = 'block';
    msgEl.style.background = 'rgba(185,76,46,.2)';
    msgEl.style.color = '#f87171';
    msgEl.style.border = '1px solid rgba(185,76,46,.3)';
    msgEl.textContent = '✕ Passwords do not match.';
    return;
  }
  const newHash = await sha256(newPw);
  localStorage.setItem(CMS_PW_KEY, newHash);
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  msgEl.style.display = 'block';
  msgEl.style.background = 'rgba(29,122,116,.2)';
  msgEl.style.color = '#2dd4bf';
  msgEl.style.border = '1px solid rgba(29,122,116,.3)';
  msgEl.textContent = '✓ Password updated successfully.';
  setTimeout(() => msgEl.style.display = 'none', 3000);
}

// ── HTML escape helper ──
function escHtml(str) {
  return String(str)
    .replace(/&amp;/g,'&amp;amp;').replace(/</g,'&amp;lt;')
    .replace(/>/g,'&amp;gt;').replace(/&quot;/g,'&amp;quot;');
}

<!-- ─── TRANSITION OVERLAY ─── -->
<div class="switch-overlay" id="overlay"></div>

<!-- ─── MODE PILL TOAST ─── -->
<div class="mode-pill" id="pill"></div>

<script>
let currentMode = 'eval';

function switchMode(mode) {
  if(mode === currentMode) return;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('show');
  setTimeout(() => {
    currentMode = mode;
    document.getElementById('wrap-eval').classList.toggle('active', mode === 'eval');
    document.getElementById('wrap-tut').classList.toggle('active', mode === 'tut');
    document.getElementById('tab-eval').classList.toggle('active', mode === 'eval');
    document.getElementById('tab-tut').classList.toggle('active', mode === 'tut');
    overlay.classList.remove('show');
    showPill(mode);
  }, 160);
}

function showPill(mode) {
  const pill = document.getElementById('pill');
  const isTut = mode === 'tut';
  pill.textContent = isTut ? '📖 Switched to Training Guide' : '⚙ Switched to Evaluator Tool';
  pill.className = 'mode-pill show' + (isTut ? ' tut' : '');
  setTimeout(() => { pill.className = 'mode-pill' + (isTut ? ' tut' : ''); }, 2200);
}

window.addEventListener('message', (e) => {
  if (!e.data || !e.data.action) return;
  if (e.data.action === 'switchToTutorial') switchMode('tut');
  if (e.data.action === 'switchToEvaluator') switchMode('eval');
});
</script>
</body>
</html>
