<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0f1117;font-family:'IBM Plex Mono',monospace}

/* ─── TOP SWITCHER BAR ─── */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  height:48px;
  background:#0d1117;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;
  padding:0 20px;gap:0;
  box-shadow:0 2px 16px rgba(0,0,0,.4)
}

.top-logo{
  font-family:'Fraunces',serif;
  font-size:16px;font-weight:900;
  color:#fff;
  margin-right:24px;
  white-space:nowrap;
  display:flex;align-items:center;gap:8px
}
.top-logo-badge{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:2px;
  background:rgba(201,137,58,.25);
  border:1px solid rgba(201,137,58,.45);
  color:#f0c87a;
  padding:2px 7px;border-radius:3px;
  text-transform:uppercase;
}

.top-divider{
  width:1px;height:24px;
  background:rgba(255,255,255,.1);
  margin:0 16px;
}

/* ─── MODE TABS ─── */
.mode-tabs{display:flex;gap:4px}
.mode-tab{
  display:flex;align-items:center;gap:7px;
  padding:6px 16px;border-radius:5px;
  font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid transparent;
  transition:all .18s;color:rgba(255,255,255,.45);
  background:transparent;letter-spacing:.3px
}
.mode-tab:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.06)}
.mode-tab.active{
  color:#fff;background:rgba(29,111,181,.25);
  border-color:rgba(29,111,181,.5)
}
.mode-tab.tut.active{
  background:rgba(201,137,58,.2);
  border-color:rgba(201,137,58,.45);
  color:#f0c87a
}

.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-hint{
  font-size:10px;letter-spacing:.5px;
  color:rgba(255,255,255,.22);
  border:1px solid rgba(255,255,255,.08);
  padding:3px 10px;border-radius:3px
}

/* ─── IFRAME CONTAINER ─── */
.frame-wrap{
  position:fixed;
  top:48px;left:0;right:0;bottom:0;
  display:none
}
.frame-wrap.active{display:block}
.frame-wrap iframe{
  width:100%;height:100%;
  border:none;display:block
}

/* ─── TRANSITION OVERLAY ─── */
.switch-overlay{
  position:fixed;inset:0;
  background:#0d1117;
  z-index:9000;
  opacity:0;pointer-events:none;
  transition:opacity .18s
}
.switch-overlay.show{opacity:1;pointer-events:all}

/* ─── MODE PILL TOAST ─── */
.mode-pill{
  position:fixed;top:60px;right:20px;
  background:#1e3a5f;border:1px solid rgba(29,111,181,.4);
  color:#93c5fd;font-size:10px;font-family:'IBM Plex Mono',monospace;
  padding:6px 14px;border-radius:20px;
  z-index:8000;opacity:0;transform:translateY(-4px);
  transition:all .3s;pointer-events:none
}
.mode-pill.show{opacity:1;transform:translateY(0)}
.mode-pill.tut{background:#2c1e0a;border-color:rgba(201,137,58,.4);color:#f0c87a}
</style>
</head>
<body>

<!-- ─── TOP SWITCHER BAR ─── -->
<div class="top-bar">
  <div class="top-logo">
    TBA Suite
    <span class="top-logo-badge">IOCL</span>
  </div>
  <div class="top-divider"></div>
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-eval" onclick="switchMode('eval')">
      <span>⚙</span>
      <span>TBA Evaluator Tool</span>
    </button>
    <button class="mode-tab tut" id="tab-tut" onclick="switchMode('tut')">
      <span>📖</span>
      <span>Setup Guide &amp; Training</span>
    </button>
  </div>
  <div class="top-right">
    <div class="top-hint">IOCL CONTRACTS DEPT</div>
  </div>
</div>

<div class="frame-wrap active" id="wrap-eval">

<style>
:root{
  --bg:#f1f5f9;--surface:#fff;--card:#f8fafc;--border:#e2e8f0;--border2:#cbd5e1;
  --accent:#1d6fb5;--acl:#eff6ff;--acl2:#dbeafe;
  --gold:#b45309;--gol:#fffbeb;--gol2:#fde68a;
  --red:#dc2626;--rel:#fef2f2;--rel2:#fecaca;
  --grn:#16a34a;--grl:#f0fdf4;--grl2:#bbf7d0;
  --ora:#c2410c;--orl:#fff7ed;--orl2:#fed7aa;
  --pur:#6d28d9;--pul:#f5f3ff;--pul2:#ddd6fe;
  --txt:#1e293b;--txt2:#475569;--muted:#94a3b8;
  --sb:#1c2b3a;--sbtext:rgba(255,255,255,.72);
  --mono:'IBM Plex Mono',monospace;
  --serif:'Fraunces',serif;
  --sans:'Inter',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:248px;background:var(--sb);overflow-y:auto;z-index:200;display:flex;flex-direction:column;box-shadow:2px 0 8px rgba(0,0,0,.15)}
.sb-brand{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-logo{font-family:var(--serif);font-size:17px;font-weight:900;color:#fff}
.sb-sub{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);margin-top:3px;letter-spacing:1.5px;text-transform:uppercase}
.sb-chip{display:inline-block;margin-top:8px;padding:2px 9px;background:rgba(29,111,181,.3);border:1px solid rgba(29,111,181,.5);color:#93c5fd;font-family:var(--mono);font-size:9px;border-radius:3px;max-width:210px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-sec{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.22);padding:13px 18px 4px}
.sb-a{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:12.5px;color:var(--sbtext);cursor:pointer;border-left:3px solid transparent;transition:all .15s;text-decoration:none}
.sb-a:hover{color:#fff;background:rgba(255,255,255,.05);border-left-color:rgba(255,255,255,.2)}
.sb-a.active{color:#fff;background:rgba(29,111,181,.22);border-left-color:#60a5fa}
.sb-icon{width:15px;text-align:center;font-size:12px;flex-shrink:0}
.sb-badge{margin-left:auto;font-family:var(--mono);font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(220,38,38,.3);color:#fca5a5}
.sb-foot{padding:12px 18px;border-top:1px solid rgba(255,255,255,.07);margin-top:auto}
.sb-plbl{font-family:var(--mono);font-size:9.5px;color:rgba(255,255,255,.35);margin-bottom:5px}
.sb-pbar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.sb-pbar-fill{height:100%;background:linear-gradient(90deg,#60a5fa,#38bdf8);transition:width .4s;border-radius:2px}

/* ── MAIN ── */
main{margin-left:248px;min-height:100vh}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 32px;height:50px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb-title{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.tb-sp{flex:1}
.tb-pill{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);color:var(--txt2);display:flex;align-items:center;gap:5px}
.tb-pill.ok{border-color:var(--grl2);background:var(--grl);color:var(--grn)}
.tb-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SECTIONS ── */
.sec{padding:32px;border-bottom:1px solid var(--border);display:none}
.sec.act{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;font-weight:700}
.sec-title{font-family:var(--serif);font-size:24px;font-weight:900;color:var(--txt);margin-bottom:4px;line-height:1.2}
.sec-lead{font-size:13px;color:var(--txt2);max-width:560px;line-height:1.75;margin-bottom:22px}

/* ── FORM ── */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:13px}
.full{grid-column:1/-1}
.fld{display:flex;flex-direction:column;gap:5px}
.lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);font-weight:700}
.hint{font-size:11px;color:var(--muted);margin-top:1px}
input,select,textarea{background:#fff;border:1px solid var(--border2);color:var(--txt);font-family:var(--sans);font-size:13px;padding:8px 11px;border-radius:5px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,111,181,.1)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:vertical;min-height:64px;line-height:1.6}
.computed{background:var(--acl);border:1px solid var(--acl2);color:var(--accent);font-family:var(--mono);font-size:13px;padding:8px 11px;border-radius:5px;min-height:37px;display:flex;align-items:center}

/* ── CARDS ── */
.card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow)}
.c-acc{border-left:4px solid var(--accent)}
.c-grn{border-left:4px solid var(--grn);background:var(--grl)}
.c-red{border-left:4px solid var(--red);background:var(--rel)}
.c-ora{border-left:4px solid var(--ora);background:var(--orl)}
.c-pur{border-left:4px solid var(--pur);background:var(--pul)}
.c-gld{border-left:4px solid var(--gold);background:var(--gol)}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.b-pri{background:var(--accent);color:#fff}
.b-pri:hover{background:#1558a0;transform:translateY(-1px)}
.b-out{background:#fff;border:1px solid var(--border2);color:var(--txt)}
.b-out:hover{border-color:var(--accent);color:var(--accent)}
.b-red{background:var(--rel);border:1px solid var(--rel2);color:var(--red)}
.b-red:hover{background:#fee2e2}
.b-gld{background:var(--gol);border:1px solid var(--gol2);color:var(--gold)}
.b-grn{background:var(--grl);border:1px solid var(--grl2);color:var(--grn)}
.b-sm{padding:5px 10px;font-size:11.5px}
.b-xs{padding:3px 7px;font-size:10.5px;border-radius:3px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:10px;font-family:var(--mono);font-size:10px;font-weight:700;white-space:nowrap}
.t-yes{background:var(--grl);color:var(--grn);border:1px solid var(--grl2)}
.t-no{background:var(--rel);color:var(--red);border:1px solid var(--rel2)}
.t-qry{background:var(--pul);color:var(--pur);border:1px solid var(--pul2)}
.t-wrn{background:var(--orl);color:var(--ora);border:1px solid var(--orl2)}
.t-na{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.t-acc{background:var(--acl);color:var(--accent);border:1px solid var(--acl2)}

/* ── ALERTS ── */
.alert{padding:11px 14px;border-radius:5px;font-size:13px;line-height:1.7;margin:8px 0;display:flex;gap:9px}
.ai{font-size:14px;flex-shrink:0;margin-top:1px}
.a-ok{background:var(--grl);border:1px solid var(--grl2);color:#15803d}
.a-err{background:var(--rel);border:1px solid var(--rel2);color:#b91c1c}
.a-wrn{background:var(--orl);border:1px solid var(--orl2);color:#9a3412}
.a-inf{background:var(--acl);border:1px solid var(--acl2);color:#1e40af}

/* ── BIDDER TABS ── */
.btabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.btab{padding:6px 13px;border-radius:5px;font-size:12px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border);color:var(--txt2);transition:all .15s;background:#fff;display:flex;align-items:center;gap:6px}
.btab:hover{border-color:var(--accent);color:var(--accent)}
.btab.active{background:var(--acl);border-color:var(--accent);color:var(--accent);font-weight:700}
.btab .td{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── WO BLOCK ── */
.wo-block{background:#fff;border:1px solid var(--border);border-radius:7px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow)}
.wo-hd{padding:10px 13px;background:var(--card);display:flex;align-items:center;gap:9px;cursor:pointer;border-bottom:1px solid var(--border);user-select:none}
.wo-num-badge{font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:700;background:var(--gol);padding:2px 7px;border-radius:3px;border:1px solid var(--gol2)}
.wo-title{font-size:13px;color:var(--txt);flex:1;font-weight:500}
.wo-body{padding:15px}
.wo-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;font-size:12px;margin-bottom:10px}
.wfl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px}

/* ── MODAL (WO Edit) ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:999;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:10px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.modal-hd-title{font-size:15px;font-weight:700;color:var(--txt)}
.modal-body{padding:20px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff}

/* ── QUERY BOX ── */
.qbox{background:var(--pul);border:1px solid var(--pul2);border-radius:6px;padding:13px 15px;margin:9px 0}
.qbox.edited{background:var(--gol);border-color:var(--gol2)}
.qlbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--pur);margin-bottom:6px;font-weight:700;display:flex;align-items:center;gap:8px}
.qbox.edited .qlbl{color:var(--gold)}
.qtext{font-size:12.5px;color:#4c1d95;line-height:1.8;white-space:pre-wrap}
.qbox.edited .qtext{color:#78350f}
.qclause{margin-top:7px;font-family:var(--mono);font-size:9.5px;color:var(--txt2)}
.q-actions{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap;align-items:center}
.q-copy{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:rgba(109,40,217,.1);border:1px solid rgba(109,40,217,.25);color:var(--pur);border-radius:3px;font-size:10px;font-family:var(--mono);cursor:pointer}
.q-edit{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--gol);border:1px solid var(--gol2);color:var(--gold);border-radius:3px;font-size:10px;font-family:var(--mono);cursor:pointer}
.q-reset{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--rel);border:1px solid var(--rel2);color:var(--red);border-radius:3px;font-size:10px;font-family:var(--mono);cursor:pointer}
.q-edit-area{display:none;margin-top:9px}
.q-edit-area textarea{font-family:var(--mono);font-size:12px;min-height:110px;background:#fffdf0;border-color:var(--gol2)}
.q-edit-area.open{display:block}

/* ── SUMMARY ── */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sum-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.sum-n{font-family:var(--serif);font-size:36px;font-weight:900;line-height:1}
.sum-l{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px}
.sum-card.s-tot .sum-n{color:var(--accent)}
.sum-card.s-acc .sum-n{color:var(--grn)}
.sum-card.s-rej .sum-n{color:var(--red)}
.sum-card.s-qry .sum-n{color:var(--pur)}

/* ── TABLE ── */
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th{background:#f1f5f9;color:var(--txt2);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 11px;text-align:left;border-bottom:2px solid var(--border2)}
.rtbl td{padding:8px 11px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.6}
.rtbl tr:hover td{background:#f8fafc}
.mc{font-family:var(--mono);font-size:11px;color:var(--gold)}

/* ── TBA PREVIEW ── */
.tba-wrap{background:#fff;border:1px solid var(--border);border-radius:8px;padding:32px;font-family:Arial,sans-serif;font-size:11.5px;line-height:1.6;box-shadow:var(--shadow)}
.tba-row{display:grid;grid-template-columns:200px 1fr;border:1px solid #ccc;margin-top:-1px}
.tba-k{padding:6px 10px;background:#f0f4f8;font-weight:700;border-right:1px solid #ccc;font-size:11px}
.tba-v{padding:6px 10px;font-size:11px}

/* ── TOOLTIP ── */
[data-tip]{position:relative;cursor:help}
[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100%+5px);left:50%;transform:translateX(-50%);background:#1e293b;color:#f8fafc;font-size:11px;padding:5px 8px;border-radius:4px;white-space:normal;max-width:220px;text-align:center;z-index:999;pointer-events:none;opacity:0;transition:opacity .15s;font-family:var(--sans);font-weight:400}
[data-tip]:hover::after{opacity:1}

hr.d{border:none;border-top:1px solid var(--border);margin:18px 0}

/* ── VERSION BADGE ── */
.v-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;background:rgba(29,111,181,.18);border:1px solid rgba(29,111,181,.35);color:#93c5fd;border-radius:3px;letter-spacing:1px;margin-left:6px;vertical-align:middle}

/* ── AUTOSAVE INDICATOR ── */
.as-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;background:var(--muted)}
.as-dot.saved{background:var(--grn);animation:none}
.as-dot.saving{background:var(--gold);animation:pulse 1s infinite}

/* ── ANNUALISATION PANEL ── */
.arc-panel{background:var(--acl);border:1px solid var(--acl2);border-radius:6px;padding:14px 16px;margin-top:10px}

/* ── ADMIN PANEL ── */
.cfg-tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:2px solid var(--border);padding-bottom:0}
.cfg-tab{padding:7px 16px;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:5px 5px 0 0;border:1px solid transparent;border-bottom:none;color:var(--txt2);background:transparent;margin-bottom:-2px}
.cfg-tab:hover{background:var(--acl);color:var(--accent)}
.cfg-tab.active{background:#fff;border-color:var(--border);color:var(--accent);font-weight:700;border-bottom-color:#fff}
.cfg-pane{display:none}.cfg-pane.active{display:block}
.cfg-item{background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;overflow:hidden}
.cfg-item-hd{padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--card);border-bottom:1px solid var(--border)}
.cfg-item-id{font-family:var(--mono);font-size:10px;background:var(--acl);color:var(--accent);border:1px solid var(--acl2);padding:2px 7px;border-radius:3px;font-weight:700;flex-shrink:0}
.cfg-item-title{font-size:12.5px;font-weight:600;flex:1}
.cfg-toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.cfg-toggle input{opacity:0;width:0;height:0;position:absolute}
.cfg-toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:9px;cursor:pointer;transition:.2s}
.cfg-toggle input:checked+.cfg-toggle-track{background:var(--grn)}
.cfg-toggle-track:before{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.cfg-toggle input:checked+.cfg-toggle-track:before{transform:translateX(16px)}
.cfg-item-body{padding:12px 14px}
.cfg-clause-row{display:grid;grid-template-columns:140px 1fr;gap:8px;align-items:center;margin-bottom:8px}
.cfg-clause-key{font-family:var(--mono);font-size:10px;color:var(--txt2);font-weight:700}
.cfg-reset-btn{font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid var(--border2);background:#fff;color:var(--txt2);cursor:pointer;white-space:nowrap}
.cfg-reset-btn:hover{border-color:var(--red);color:var(--red)}
.cfg-lock{text-align:center;padding:40px 20px}
.cfg-lock-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.cfg-lock input{width:100%;max-width:280px;padding:9px 14px;border:1px solid var(--border2);border-radius:5px;font-size:14px;text-align:center;letter-spacing:3px;outline:none;font-family:var(--mono);margin-bottom:12px}
.cfg-lock input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,111,181,.12)}
.cfg-changed{font-size:9px;font-family:var(--mono);color:var(--gold);background:var(--gol);border:1px solid var(--gol2);padding:1px 6px;border-radius:3px;margin-left:6px}

/* ── PRINT STYLES ── */
@media print{
  .sidebar,.topbar,.btn,.q-actions,.q-edit-area,.btabs,.modal-bg{display:none!important}
  main{margin-left:0!important}
  .sec{display:block!important;border:none!important;padding:12px 0!important}
  .sec:not(#sec-tba){display:none!important}
  #sec-tba{display:block!important}
  .tba-wrap{border:none!important;box-shadow:none!important;padding:0!important}
  body{background:#fff!important;color:#000!important;font-size:10pt}
  @page{margin:15mm 12mm;size:A4 landscape}
}</style>

<style id=&quot;iframe-override&quot;>
/* When embedded in the TBA Suite wrapper, hide the internal topbar */
.topbar { display: none !important; }
main { padding-top: 0 !important; }
</style>
</head>
<body>

<!-- ════════ SIDEBAR ════════ -->
<aside class=&quot;sidebar&quot;>
  <div class=&quot;sb-brand&quot;>
    <div class=&quot;sb-logo&quot;>TBA Evaluator <span class=&quot;v-badge&quot;>v3</span></div>
    <div class=&quot;sb-sub&quot;>IOCL · Techno-Commercial Bid Analysis</div>
    <div class=&quot;sb-chip&quot; id=&quot;sb-chip&quot;>No Tender Loaded</div>
    <div style=&quot;margin-top:8px;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);display:flex;align-items:center&quot;>
      <span class=&quot;as-dot&quot; id=&quot;as-dot&quot;></span><span id=&quot;as-lbl&quot;>Auto-save off</span>
    </div>
  </div>
  <nav style=&quot;padding:6px 0;flex:1&quot;>
    <div class=&quot;sb-sec&quot;>Setup</div>
    <a class=&quot;sb-a active&quot; onclick=&quot;nav('sec-setup')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>⚙</span>Tender Configuration</a>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-pqc')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>📋</span>PQC Criteria</a>
    <div class=&quot;sb-sec&quot;>Evaluation</div>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-bidders')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>👥</span>Manage Bidders</a>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-eval')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>🔍</span>Evaluate Bids</a>
    <div class=&quot;sb-sec&quot;>Output</div>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-queries')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>❓</span>Query Register<span class=&quot;sb-badge&quot; id=&quot;sb-qct&quot;>0</span></a>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-summary')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>📊</span>TBA Summary</a>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-tba')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>📄</span>TBA Format Preview</a>
    <div class=&quot;sb-sec&quot;>Admin</div>
    <a class=&quot;sb-a&quot; onclick=&quot;nav('sec-admin')&quot; href=&quot;#&quot;><span class=&quot;sb-icon&quot;>🔐</span>Config &amp;amp; Rules</a>
  </nav>
  <div class=&quot;sb-foot&quot;>
    <div class=&quot;sb-plbl&quot; id=&quot;sb-plbl&quot;>0 of 0 evaluated</div>
    <div class=&quot;sb-pbar&quot;><div class=&quot;sb-pbar-fill&quot; id=&quot;sb-pbar&quot; style=&quot;width:0%&quot;></div></div>
  </div>
</aside>

<!-- ════════ MAIN ════════ -->
<main>
  <div class=&quot;topbar&quot;>
    <div class=&quot;tb-title&quot;>TBA Evaluator v3 · IOCL Procurement</div>
    <div class=&quot;tb-sp&quot;></div>
    <span id=&quot;fileBadge&quot; style=&quot;display:none;align-items:center;gap:5px;background:rgba(29,111,181,.18);border:1px solid rgba(29,111,181,.35);border-radius:5px;padding:3px 10px;font-size:10px;color:#93c5fd;font-family:var(--mono);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap&quot;></span>
    <div class=&quot;tb-pill ok&quot;><div class=&quot;tb-dot&quot;></div><span id=&quot;tb-txt&quot;>Ready to Configure</span></div>
    <button class=&quot;btn b-out b-sm&quot; onclick=&quot;showFileMenu()&quot;>📎 Link File</button>
    <button class=&quot;btn b-out b-sm&quot; onclick=&quot;saveSession()&quot; title=&quot;Download session as JSON&quot;>💾 Save JSON</button>
    <label class=&quot;btn b-out b-sm&quot; style=&quot;cursor:pointer&quot; title=&quot;Load a previously saved JSON session&quot;>📂 Load JSON<input type=&quot;file&quot; accept=&quot;.json&quot; onchange=&quot;loadSession(event)&quot; style=&quot;display:none&quot;/></label>
    <button class=&quot;btn b-out b-sm&quot; onclick=&quot;exportExcel()&quot;>📊 Export Excel</button>
    <button class=&quot;btn b-out b-sm&quot; onclick=&quot;printTBA()&quot;>🖨 Print TBA</button>
    <button class=&quot;btn b-sm&quot; style=&quot;background:#1a1a2e;color:#f0c87a;border:1px solid rgba(201,137,58,.4)&quot; onclick=&quot;window.parent.postMessage({action:'switchToTutorial'},'*')&quot;>📖 Open Training Guide</button>
  </div>

  <!-- ══ SETUP ══ -->
  <section class=&quot;sec act&quot; id=&quot;sec-setup&quot;>
    <div class=&quot;eyebrow&quot;>Step 1 · Tender Header</div>
    <h2 class=&quot;sec-title&quot;>Tender Configuration</h2>
    <p class=&quot;sec-lead&quot;>Enter tender details first. Qualifying period is auto-calculated. All PQC thresholds derive from values entered here.</p>

    <div class=&quot;fg&quot;>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Tender Number</label>
        <input type=&quot;text&quot; id=&quot;f-tno&quot; placeholder=&quot;e.g. IOCL/GD/MECH/2024/TUR-001&quot; oninput=&quot;document.getElementById('sb-chip').textContent=this.value||'No Tender Loaded'&quot;/>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>TBA Type</label>
        <select id=&quot;f-ttype&quot;>
          <option>Initial TBA</option>
          <option>Final TBA</option>
          <option>TR-2</option>
        </select>
      </div>
      <div class=&quot;fld full&quot;>
        <label class=&quot;lbl&quot;>Name of Work</label>
        <input type=&quot;text&quot; id=&quot;f-tname&quot; placeholder=&quot;e.g. Shutdown &amp; TAR at CDU-I/II, Mathura Refinery&quot;/>
        <div class=&quot;hint&quot;>Copy verbatim from NIT Clause 3 of this specific tender</div>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>ARC / Non-ARC</label>
        <select id=&quot;f-tarc&quot;>
          <option value=&quot;Non-ARC&quot;>Non-ARC / One-Time Job</option>
          <option value=&quot;ARC&quot;>ARC — Annual Rate Contract</option>
        </select>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Critical Job?</label>
        <select id=&quot;f-tcrit&quot;>
          <option value=&quot;No&quot;>No</option>
          <option value=&quot;Yes&quot;>Yes — Cl. 22 (No relaxation)</option>
        </select>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Sub-contracting Permitted?</label>
        <select id=&quot;f-tsub&quot;>
          <option value=&quot;No&quot;>No — Not Permitted (Cl. 23.i)</option>
          <option value=&quot;Yes&quot;>Yes — Permitted</option>
        </select>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Original Bid Submission End Date</label>
        <input type=&quot;date&quot; id=&quot;f-torig&quot; onchange=&quot;calcQP()&quot;/>
        <div class=&quot;hint&quot;>⚠ Original date only — not the extended date (Cl. 11.2 Note 2)</div>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Extended Bid Date (reference only)</label>
        <input type=&quot;date&quot; id=&quot;f-text&quot; onchange=&quot;calcQP()&quot;/>
        <div class=&quot;hint&quot;>For record only — NOT used for QP calculation</div>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Qualifying Period — FROM (auto)</label>
        <div class=&quot;computed&quot; id=&quot;qp-from&quot;>—</div>
      </div>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Qualifying Period — TO (auto)</label>
        <div class=&quot;computed&quot; id=&quot;qp-to&quot;>—</div>
      </div>
    </div>

    <div class=&quot;alert a-wrn&quot; id=&quot;ext-alert&quot; style=&quot;display:none&quot;>
      <div class=&quot;ai&quot;>⚠</div>
      <div>Extended bid date detected. QP is calculated from the <strong>original</strong> bid submission date per Cl. 11.2 Note 2 — not the extended date. The original date is the legally correct reference.</div>
    </div>

    <div class=&quot;fld full&quot; style=&quot;margin-bottom:14px&quot;>
      <label class=&quot;lbl&quot;>Similar Nature of Job — NIT Cl. 11.3</label>
      <textarea id=&quot;f-tsim&quot; rows=&quot;4&quot; placeholder=&quot;e.g. Turnaround or Shutdown jobs including maintenance of heat exchangers, Columns/Vessels, Furnace, hot job works including CS/SS/AS piping in any petroleum refinery / Petrochemical Plants / Hydrocarbon Fertilizers / Hydrocarbon Industry.&quot;></textarea>
      <div class=&quot;hint&quot;>⚠ This must come from THIS NIT's Cl. 11.3 — definition changes with every tender</div>
    </div>

    <div class=&quot;fld&quot; style=&quot;max-width:200px;margin-bottom:20px&quot;>
      <label class=&quot;lbl&quot;>Total Bids Received</label>
      <input type=&quot;number&quot; id=&quot;f-tbids&quot; placeholder=&quot;e.g. 5&quot; min=&quot;1&quot;/>
    </div>

    <div style=&quot;display:flex;gap:10px&quot;>
      <button class=&quot;btn b-pri&quot; onclick=&quot;saveSetup()&quot;>✓ Save Configuration</button>
      <button class=&quot;btn b-out&quot; onclick=&quot;nav('sec-pqc')&quot;>Next: PQC →</button>
    </div>
  </section>

  <!-- ══ PQC ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-pqc&quot;>
    <div class=&quot;eyebrow&quot;>Step 2 · Pre-Qualification Criteria</div>
    <h2 class=&quot;sec-title&quot;>PQC Benchmarks</h2>
    <p class=&quot;sec-lead&quot;>Record all three SWO options from NIT Cl. 11.2 before entering any bidder name. A bidder qualifies if they satisfy any ONE option.</p>
    <div class=&quot;alert a-inf&quot;><div class=&quot;ai&quot;>ℹ</div><div>Set benchmarks first — this pre-determined standard protects evaluation integrity under audit, vigilance, and legal scrutiny.</div></div>

    <div class=&quot;card c-acc&quot; style=&quot;margin-top:14px&quot;>
      <div style=&quot;font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:13px;font-weight:700&quot;>SWO Experience — NIT Cl. 11.2 (enter full ₹ rupee values)</div>
      <div class=&quot;fg3&quot;>
        <div class=&quot;fld&quot;>
          <label class=&quot;lbl&quot;>Option A — 1 similar job ≥</label>
          <input type=&quot;number&quot; id=&quot;p-swo1&quot; placeholder=&quot;e.g. 51741000&quot; oninput=&quot;pqcHints()&quot;/>
          <div class=&quot;hint&quot; id=&quot;h-swo1&quot;>—</div>
        </div>
        <div class=&quot;fld&quot;>
          <label class=&quot;lbl&quot;>Option B — 2 similar jobs, each ≥</label>
          <input type=&quot;number&quot; id=&quot;p-swo2&quot; placeholder=&quot;e.g. 41393000&quot; oninput=&quot;pqcHints()&quot;/>
          <div class=&quot;hint&quot; id=&quot;h-swo2&quot;>—</div>
        </div>
        <div class=&quot;fld&quot;>
          <label class=&quot;lbl&quot;>Option C — 3 similar jobs, each ≥</label>
          <input type=&quot;number&quot; id=&quot;p-swo3&quot; placeholder=&quot;e.g. 31045000&quot; oninput=&quot;pqcHints()&quot;/>
          <div class=&quot;hint&quot; id=&quot;h-swo3&quot;>—</div>
        </div>
      </div>
    </div>

    <div class=&quot;fg&quot; style=&quot;margin-top:12px&quot;>
      <div class=&quot;fld&quot;>
        <label class=&quot;lbl&quot;>Additional Tech PQC (NIT Cl. 12)</label>
        <textarea id=&quot;p-addl&quot; rows=&quot;3&quot; placeholder=&quot;Write NIL if not applicable. Specify verbatim otherwise.&quot;></textarea>
      </div>
    </div>

    <div class=&quot;arc-panel&quot; id=&quot;arc-panel&quot; style=&quot;display:none&quot;>
      <div style=&quot;font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:700&quot;>ARC — Annualisation (NIT Cl. 21)</div>
      <div class=&quot;alert a-inf&quot; style=&quot;margin-bottom:10px&quot;><div class=&quot;ai&quot;>ℹ</div><div>For Annual Rate Contracts, the executed value is <strong>annualised</strong> before PQC comparison — i.e. divided by the actual work duration (WO commencement date → CC completion date) to give a per-year value. Ensure both dates are entered on each WO.</div></div>
      <div class=&quot;fg3&quot;>
        <div class=&quot;fld&quot;>
          <label class=&quot;lbl&quot;>Annualisation Basis</label>
          <select id=&quot;p-arc-basis&quot; onchange=&quot;autoSave()&quot;>
            <option value=&quot;prorate&quot;>Pro-rata — exec value ÷ actual work duration (commencement → completion)</option>
            <option value=&quot;full&quot;>Full value credited — no annualisation</option>
          </select>
        </div>
      </div>
      <div class=&quot;alert a-wrn&quot;><div class=&quot;ai&quot;>⚠</div><div>The annualised (per-year) value is used for PQC threshold comparison — <strong>not</strong> the total CC executed value. WO commencement date and CC completion date are both required for the calculation.</div></div>
    </div>

    <div style=&quot;display:flex;gap:10px;margin-top:8px&quot;>
      <button class=&quot;btn b-pri&quot; onclick=&quot;savePQC()&quot;>✓ Save PQC</button>
      <button class=&quot;btn b-out&quot; onclick=&quot;nav('sec-bidders')&quot;>Next: Add Bidders →</button>
    </div>
  </section>

  <!-- ══ BIDDERS ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-bidders&quot;>
    <div class=&quot;eyebrow&quot;>Step 3 · Bidder Management</div>
    <h2 class=&quot;sec-title&quot;>Manage Bidders</h2>
    <p class=&quot;sec-lead&quot;>Add each bidder. Multiple Work Orders per bidder are supported. All WO details remain fully editable after submission.</p>

    <div class=&quot;card c-acc&quot; style=&quot;margin-bottom:18px&quot;>
      <div style=&quot;font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:13px;font-weight:700&quot;>Add New Bidder</div>
      <div class=&quot;fg&quot;>
        <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>Company Name</label><input type=&quot;text&quot; id=&quot;nb-name&quot; placeholder=&quot;e.g. ABC Engineering Pvt. Ltd.&quot;/></div>
        <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>Bid Reference / Bid No.</label><input type=&quot;text&quot; id=&quot;nb-ref&quot; placeholder=&quot;e.g. Bid #2 / ABC-001&quot;/></div>
        <div class=&quot;fld&quot;>
          <label class=&quot;lbl&quot;>Sub-contracting Indicated in Bid?</label>
          <select id=&quot;nb-sub&quot;><option value=&quot;No&quot;>No</option><option value=&quot;Yes&quot;>Yes — indicated in technical bid</option></select>
        </div>

      </div>
      <button class=&quot;btn b-pri b-sm&quot; onclick=&quot;addBidder()&quot;>+ Add Bidder</button>
    </div>

    <div id=&quot;bidder-list&quot;></div>

    <div style=&quot;display:flex;gap:10px;margin-top:14px&quot;>
      <button class=&quot;btn b-pri&quot; onclick=&quot;nav('sec-eval')&quot;>Next: Evaluate Bids →</button>
    </div>
  </section>

  <!-- ══ EVALUATE ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-eval&quot;>
    <div class=&quot;eyebrow&quot;>Step 4 · Bid Evaluation</div>
    <h2 class=&quot;sec-title&quot;>Evaluate Each Bidder</h2>
    <p class=&quot;sec-lead&quot;>Select a bidder, add their Work Orders, and the engine auto-evaluates. All WO details are editable. Queries are auto-generated and individually editable.</p>
    <div class=&quot;btabs&quot; id=&quot;eval-tabs&quot;></div>
    <div id=&quot;eval-area&quot;><div style=&quot;text-align:center;padding:32px;color:var(--muted);font-family:var(--mono);font-size:12px&quot;>Add bidders in the previous step to begin evaluation</div></div>
  </section>

  <!-- ══ QUERIES ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-queries&quot;>
    <div class=&quot;eyebrow&quot;>Output · Query Register</div>
    <h2 class=&quot;sec-title&quot;>Generated Queries</h2>
    <p class=&quot;sec-lead&quot;>All auto-generated, clause-referenced queries are collected here. Each can be individually edited while preserving the original standard text. Queries clarify existing submissions — they cannot invite new experience.</p>
    <div class=&quot;alert a-wrn&quot;><div class=&quot;ai&quot;>⚠</div><div><strong>Golden Rule:</strong> A query is to clarify what was already submitted — not to invite fresh WOs, increase values, or cure a substantive PQC shortfall.</div></div>
    <div id=&quot;q-register&quot; style=&quot;margin-top:18px&quot;></div>
  </section>

  <!-- ══ SUMMARY ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-summary&quot;>
    <div class=&quot;eyebrow&quot;>Output · Summary</div>
    <h2 class=&quot;sec-title&quot;>TBA Summary</h2>
    <p class=&quot;sec-lead&quot;>Evaluation summary across all bidders.</p>
    <div class=&quot;sum-grid&quot; id=&quot;sum-stats&quot;>
      <div class=&quot;sum-card s-tot&quot;><div class=&quot;sum-n&quot; id=&quot;st-tot&quot;>0</div><div class=&quot;sum-l&quot;>Total Bids</div></div>
      <div class=&quot;sum-card s-acc&quot;><div class=&quot;sum-n&quot; id=&quot;st-acc&quot;>0</div><div class=&quot;sum-l&quot;>Accepted</div></div>
      <div class=&quot;sum-card s-rej&quot;><div class=&quot;sum-n&quot; id=&quot;st-rej&quot;>0</div><div class=&quot;sum-l&quot;>Rejected</div></div>
      <div class=&quot;sum-card s-qry&quot;><div class=&quot;sum-n&quot; id=&quot;st-qry&quot;>0</div><div class=&quot;sum-l&quot;>Query Pending</div></div>
    </div>
    <div id=&quot;sum-table&quot;></div>
  </section>

  <!-- ══ TBA FORMAT ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-tba&quot;>
    <div class=&quot;eyebrow&quot;>Output · Formal Format</div>
    <h2 class=&quot;sec-title&quot;>TBA Format Preview</h2>
    <p class=&quot;sec-lead&quot;>IOCL standard TBA format. Use Print TBA to generate a print-ready A4/landscape page — only this format will be printed, without the sidebar or navigation.</p>
    <div style=&quot;display:flex;gap:10px;margin-bottom:18px&quot;>
      <button class=&quot;btn b-pri&quot; onclick=&quot;printTBA()&quot;>🖨 Print TBA (A4 Landscape)</button>
      <button class=&quot;btn b-out&quot; onclick=&quot;exportExcel()&quot;>⬇ Export Excel</button>
    </div>
    <div id=&quot;tba-area&quot;></div>
  </section>

  <!-- ══ ADMIN CONFIG ══ -->
  <section class=&quot;sec&quot; id=&quot;sec-admin&quot;>
    <div class=&quot;eyebrow&quot;>Admin · Protected</div>

<!-- ════════ EDIT WO MODAL ════════ -->
<div class=&quot;modal-bg&quot; id=&quot;wo-modal&quot;>
  <div class=&quot;modal&quot;>
    <div class=&quot;modal-hd&quot;>
      <div class=&quot;modal-hd-title&quot; id=&quot;modal-title&quot;>Edit Work Order</div>
      <button class=&quot;btn b-out b-sm&quot; onclick=&quot;closeModal()&quot;>✕ Close</button>
    </div>
    <div class=&quot;modal-body&quot; id=&quot;modal-body&quot;></div>
    <div class=&quot;modal-ft&quot;>
      <button class=&quot;btn b-out&quot; onclick=&quot;closeModal()&quot;>Cancel</button>
      <button class=&quot;btn b-pri&quot; onclick=&quot;saveWOEdit()&quot;>✓ Save Changes</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S = {
  tender: {},
  pqc: {},
  bidders: [],       // [{id, name, ref, sub, ato, wos:[], verdict, queries:[], remarks}]
  curBidder: 0,
  editingWO: null,   // {bidderIdx, woIdx}
};

// ════════════════════════════════════════════════════════
// CONSTANTS — single source of truth for all magic numbers
// ════════════════════════════════════════════════════════
const K = {
  LACS:          100000,  // rupees per lac — used in all lac conversion
  QP_YEARS:      7,       // qualifying period lookback in years (NIT Cl. 11.2 Note 2)
  DEBOUNCE_MS:   900,     // autosave / file-write debounce delay (ms)
  TOAST_MS:      2200,    // toast visible duration before fade-out starts (ms)
  TOAST_FADE_MS: 300,     // toast CSS opacity transition duration (ms)
  PRINT_DELAY_MS:300,     // delay before window.print() to let render settle (ms)
};

// ════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════
function nav(id) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('act'));
  const secEl=document.getElementById(id); if(secEl) secEl.classList.add('act');
  document.querySelectorAll('.sb-a').forEach(a => a.classList.remove('active'));
  document.querySelectorAll('.sb-a').forEach(a => { if((a.getAttribute('onclick')||'').includes(id)) a.classList.add('active'); });
  if(id==='sec-eval') renderEvalTabs();
  if(id==='sec-queries') renderQueryReg();
  if(id==='sec-summary') renderSummary();
  if(id==='sec-tba') renderTBAPreview();
  if(id==='sec-bidders') renderBidderList();
  window.scrollTo(0,0);
}

// ════════════════════════════════════════════════════════
// FORMAT HELPERS
// ════════════════════════════════════════════════════════
function toLac(v){
  if(!v||isNaN(v)||v===0) return '—';
  return (v/K.LACS).toFixed(2)+' L';
}
function toLacN(v){
  if(!v||isNaN(v)||v===0) return '—';
  return '₹'+(v/K.LACS).toFixed(2)+' L';
}
function fmtDate(s){
  if(!s) return '—';
  const d=new Date(s);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

// ════════════════════════════════════════════════════════
// SETUP
// ════════════════════════════════════════════════════════
function calcQP(){
  const orig=document.getElementById('f-torig').value;
  const ext=document.getElementById('f-text').value;
  document.getElementById('ext-alert').style.display=(ext&amp;&amp;ext!==orig)?'flex':'none';
  if(!orig){document.getElementById('qp-from').textContent='—';document.getElementById('qp-to').textContent='—';return;}
  const d=new Date(orig);
  const from=new Date(d);from.setFullYear(from.getFullYear()-K.QP_YEARS);
  document.getElementById('qp-from').textContent=fmtDate(from.toISOString().split('T')[0]);
  document.getElementById('qp-to').textContent=fmtDate(orig);
}
function saveSetup(){
  S.tender={
    tno:document.getElementById('f-tno').value,
    ttype:document.getElementById('f-ttype').value,
    tname:document.getElementById('f-tname').value,
    tarc:document.getElementById('f-tarc').value,
    tcrit:document.getElementById('f-tcrit').value,
    tsub:document.getElementById('f-tsub').value,
    torig:document.getElementById('f-torig').value,
    text:document.getElementById('f-text').value,
    tsim:document.getElementById('f-tsim').value,
    tbids:document.getElementById('f-tbids').value,
    qpFrom:document.getElementById('qp-from').textContent,
    qpTo:document.getElementById('qp-to').textContent,
  };
  document.getElementById('sb-chip').textContent=S.tender.tno||'No Tender Loaded';
  document.getElementById('tb-txt').textContent=S.tender.tno||'Configured';
  toggleARCPanel();
  toast('Tender configuration saved ✓','ok');
  updateProgress();
  autoSave();
}

// ════════════════════════════════════════════════════════
// PQC
// ════════════════════════════════════════════════════════
function pqcHints(){
  const ids=['swo1','swo2','swo3'];
  ids.forEach(id=>{
    const v=parseFloat(document.getElementById('p-'+id).value)||0;
    document.getElementById('h-'+id).textContent=v?'= '+toLacN(v):'—';
  });

}
function savePQC(){
  S.pqc={
    swo1:parseFloat(document.getElementById('p-swo1').value)||0,
    swo2:parseFloat(document.getElementById('p-swo2').value)||0,
    swo3:parseFloat(document.getElementById('p-swo3').value)||0,
    addl:document.getElementById('p-addl').value||'NIL',
    arcBasis:document.getElementById('p-arc-basis').value||'prorate',
  };
  // Re-evaluate all bidders whenever PQC changes
  S.bidders.forEach((_,i)=>evaluateBidder(i));
  toast('PQC criteria saved ✓','ok');
  autoSave();
}

// ════════════════════════════════════════════════════════
// BIDDER MANAGEMENT
// ════════════════════════════════════════════════════════
function addBidder(){
  const name=document.getElementById('nb-name').value.trim();
  if(!name){toast('Enter bidder name','warn');return;}
  S.bidders.push({
    id:Date.now(),name,
    ref:document.getElementById('nb-ref').value,
    sub:document.getElementById('nb-sub').value,

    wos:[],verdict:'pending',queries:[],remarks:'',
  });
  document.getElementById('nb-name').value='';
  document.getElementById('nb-ref').value='';
  document.getElementById('nb-sub').value='No';

  renderBidderList();
  updateProgress();
  toast('Bidder added ✓','ok');
  autoSave();
}
function removeBidder(i){
  if(!confirm('Remove '+S.bidders[i].name+'?')) return;
  S.bidders.splice(i,1);
  if(S.curBidder>=S.bidders.length) S.curBidder=Math.max(0,S.bidders.length-1);
  renderBidderList();updateProgress();autoSave();
}
function renderBidderList(){
  const el=document.getElementById('bidder-list');
  if(!S.bidders.length){el.innerHTML='<div style=&quot;text-align:center;padding:24px;color:var(--muted);font-family:var(--mono);font-size:12px&quot;>No bidders added yet</div>';return;}
  el.innerHTML=S.bidders.map((b,i)=>`
    <div class=&quot;card&quot; style=&quot;display:flex;align-items:center;gap:14px&quot;>
      <div style=&quot;font-family:var(--serif);font-size:26px;font-weight:900;color:var(--gold);width:32px;text-align:center&quot;>${i+1}</div>
      <div style=&quot;flex:1&quot;>
        <div style=&quot;font-size:14px;font-weight:700&quot;>${b.name}</div>
        <div style=&quot;font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px&quot;>${b.ref||'No ref'} · ${b.wos.length} WO(s)</div>
      </div>
      <span class=&quot;tag ${verdictTag(b.verdict)}&quot;>${b.verdict==='pending'?'Not Evaluated':b.verdict}</span>
      <button class=&quot;btn b-out b-sm&quot; onclick=&quot;S.curBidder=${i};nav('sec-eval')&quot;>Evaluate</button>
      <button class=&quot;btn b-red b-sm&quot; onclick=&quot;removeBidder(${i})&quot;>✕</button>
    </div>
  `).join('');
}
function verdictTag(v){return v==='Accepted'?'t-yes':v==='Rejected'?'t-no':v==='Query'?'t-qry':'t-na';}

// ════════════════════════════════════════════════════════
// WO FORM TEMPLATE
// ════════════════════════════════════════════════════════
function woFormHTML(wo=null){
  const v=f=>wo?wo[f]:'';
  const sel=(f,val)=>wo&amp;&amp;wo[f]===val?'selected':'';
  return `
  <div class=&quot;fg&quot;>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>WO Number</label><input type=&quot;text&quot; id=&quot;wf-num&quot; placeholder=&quot;e.g. BPCL/MR/2022/S001&quot; value=&quot;${v('num')}&quot;/></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>WO Issue / Commencement Date</label><input type=&quot;date&quot; id=&quot;wf-date&quot; value=&quot;${v('date')}&quot;/></div>
    <div class=&quot;fld full&quot;><label class=&quot;lbl&quot;>Job Description / Scope</label>
      <textarea id=&quot;wf-desc&quot; rows=&quot;2&quot; placeholder=&quot;e.g. Shutdown maintenance — heat exchangers, vessels, CS piping at BPCL Mumbai Refinery&quot;>${v('desc')}</textarea></div>

  </div>
  <hr class=&quot;d&quot;>
  <div style=&quot;font-family:var(--mono);font-size:9.5px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:700&quot;>Completion Certificate Details</div>
  <div class=&quot;fg&quot;>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>CC Submitted?</label>
      <select id=&quot;wf-cc&quot;>
        <option value=&quot;yes&quot; ${sel('cc','yes')}>Yes — CC submitted</option>
        <option value=&quot;no&quot; ${sel('cc','no')}>No — CC not submitted</option>
        <option value=&quot;partial&quot; ${sel('cc','partial')}>CC submitted but incomplete</option>
        <option value=&quot;running&quot; ${sel('cc','running')}>Running WO — no CC yet</option>
      </select></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>WO No. as Stated in CC</label>
      <input type=&quot;text&quot; id=&quot;wf-ccnum&quot; placeholder=&quot;WO No. referenced in CC (if different)&quot; value=&quot;${v('ccNum')}&quot;/>
      <div class=&quot;hint&quot;>Leave blank if same as WO Number above</div></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>CC Executed Value (₹, incl. GST)</label>
      <input type=&quot;number&quot; id=&quot;wf-exec&quot; placeholder=&quot;₹ from Completion Certificate&quot; value=&quot;${v('exec')}&quot;/>
      <div class=&quot;hint&quot; id=&quot;wf-exec-h&quot;>${v('exec')?toLacN(parseFloat(v('exec'))):'—'}</div></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>CC Completion Date</label><input type=&quot;date&quot; id=&quot;wf-comp&quot; value=&quot;${v('comp')}&quot;/></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>GST Specified in CC?</label>
      <select id=&quot;wf-gst&quot;>
        <option value=&quot;yes&quot; ${sel('gst','yes')}>Yes — GST separately stated</option>
        <option value=&quot;no&quot; ${sel('gst','no')}>No — silent on GST</option>
        <option value=&quot;excl&quot; ${sel('gst','excl')}>CC states value is ex-GST</option>
      </select></div>
  </div>
  <hr class=&quot;d&quot;>
  <div style=&quot;font-family:var(--mono);font-size:9.5px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;font-weight:700&quot;>Nature &amp; Sub-contract Checks</div>
  <div class=&quot;fg&quot;>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>Similar Nature Assessment</label>
      <select id=&quot;wf-sim&quot; onchange=&quot;toggleUnclearPanel(this.value)&quot;>
        <option value=&quot;yes&quot; ${sel('sim','yes')}>Yes — fully meets Cl. 11.3 definition</option>

        <option value=&quot;no&quot; ${sel('bif','no')}>No — composite CC, no bifurcation</option>
      </select></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>WO Currency</label>
      <select id=&quot;wf-cur&quot;>

        <option value=&quot;USD&quot; ${sel('cur','USD')}>USD</option>

        <option value=&quot;GBP&quot; ${sel('cur','GBP')}>GBP</option>
        <option value=&quot;Other&quot; ${sel('cur','Other')}>Other Foreign Currency</option>
      </select></div>
    <div class=&quot;fld&quot;><label class=&quot;lbl&quot;>Own Plant / Own Project?</label>
      <select id=&quot;wf-own&quot;>
        <option value=&quot;no&quot; ${sel('own','no')}>No — external client</option>
        <option value=&quot;yes&quot; ${sel('own','yes')}>Yes — bidder's own plant/project</option>
      </select></div>
  </div>
  `;
}

// ════════════════════════════════════════════════════════
// MODAL — ADD / EDIT WO
// ════════════════════════════════════════════════════════
function openAddWO(bidderIdx){
  S.editingWO={bidderIdx, woIdx:-1};
  document.getElementById('modal-title').textContent='Add Work Order — '+S.bidders[bidderIdx].name;
  document.getElementById('modal-body').innerHTML=woFormHTML(null);
  attachWOHints();
  document.getElementById('wo-modal').classList.add('open');
}
function openEditWO(bidderIdx,woIdx){
  S.editingWO={bidderIdx,woIdx};
  const wo=S.bidders[bidderIdx].wos[woIdx];
  document.getElementById('modal-title').textContent='Edit WO-'+(woIdx+1)+' — '+S.bidders[bidderIdx].name;
  document.getElementById('modal-body').innerHTML=woFormHTML(wo);
  attachWOHints();
  document.getElementById('wo-modal').classList.add('open');
}
function closeModal(){document.getElementById('wo-modal').classList.remove('open');}
function attachWOHints(){
  const valFn=()=>{const v=parseFloat(document.getElementById('wf-val').value)||0;document.getElementById('wf-val-h').textContent=v?toLacN(v):'—'};
  const execFn=()=>{const v=parseFloat(document.getElementById('wf-exec').value)||0;document.getElementById('wf-exec-h').textContent=v?toLacN(v):'—'};
  document.getElementById('wf-val').addEventListener('input',valFn);
  document.getElementById('wf-exec').addEventListener('input',execFn);
}
function toggleUnclearPanel(val){
  const p=document.getElementById('wf-unclear-panel');
  if(p) p.style.display=(val==='unclear'||val==='partial')?'block':'none';
}

function saveWOEdit(){
  const {bidderIdx,woIdx}=S.editingWO;
  const wo={
    num:document.getElementById('wf-num').value.trim(),
    ccNum:document.getElementById('wf-ccnum').value.trim(),
    date:document.getElementById('wf-date').value,
    desc:document.getElementById('wf-desc').value,
    owner:document.getElementById('wf-owner').value,
    val:parseFloat(document.getElementById('wf-val').value)||0,
    cc:document.getElementById('wf-cc').value,
    exec:parseFloat(document.getElementById('wf-exec').value)||0,
    comp:document.getElementById('wf-comp').value,
    gst:document.getElementById('wf-gst').value,
    sim:document.getElementById('wf-sim').value,
    uncPlant:(document.getElementById('wf-sim').value==='unclear'||document.getElementById('wf-sim').value==='partial')&amp;&amp;document.getElementById('wf-unc-plant').checked,
    uncScope:(document.getElementById('wf-sim').value==='unclear'||document.getElementById('wf-sim').value==='partial')&amp;&amp;document.getElementById('wf-unc-scope').checked,
    uncValue:(document.getElementById('wf-sim').value==='unclear'||document.getElementById('wf-sim').value==='partial')&amp;&amp;document.getElementById('wf-unc-value').checked,
    subw:document.getElementById('wf-subw').value,
    bif:document.getElementById('wf-bif').value,
    cur:document.getElementById('wf-cur').value,
    own:document.getElementById('wf-own').value,
  };
  if(!wo.num){toast('WO number is required','warn');return;}
  if(woIdx===-1) S.bidders[bidderIdx].wos.push(wo);
  else S.bidders[bidderIdx].wos[woIdx]=wo;
  closeModal();
  evaluateBidder(bidderIdx);
  renderEvalBidder(bidderIdx);
  toast(woIdx===-1?'WO added ✓':'WO updated ✓','ok');
  autoSave();
}
function removeWO(bi,wi){
  if(!confirm('Remove WO-'+(wi+1)+'?')) return;
  S.bidders[bi].wos.splice(wi,1);
  evaluateBidder(bi);
  renderEvalBidder(bi);
  autoSave();
}

// ════════════════════════════════════════════════════════
// QUALIFYING PERIOD CHECK
// ════════════════════════════════════════════════════════
function inQP(dateStr){
  if(!dateStr||!S.tender.torig) return true; // can't check — don't exclude
  const comp=new Date(dateStr);
  const orig=new Date(S.tender.torig);
  const from=new Date(orig);from.setFullYear(from.getFullYear()-K.QP_YEARS);
  return comp>=from &amp;&amp; comp<=orig;
}

const QT={
  'Q-1E':(wo)=>({id:'Q-1E',clause:'NIT Cl. 24.iii.B(b)(1)',title:'CC — WO Number Mismatch',
    text:`The Work Order submitted bears WO No. ${wo.num||'[WO No.]'}. However, the Completion Certificate references WO No. ${wo.ccNum||'[CC WO No.]'}, which does not match the WO number submitted.\n\nAs per NIT Cl. 24.iii.B(b)(1), the Completion Certificate must clearly correspond to the Work Order submitted. Please clarify and submit:\n(a) A revised or supplementary certificate from the end-client/EIC confirming that WO No. ${wo.num||'[WO No.]'} and the CC reference (${wo.ccNum||'[CC WO No.]'}) relate to the same scope of work, or\n(b) An explanation letter confirming the reason for difference (e.g., internal numbering, amendment reference, etc.) supported by documentary evidence.`}),
  'Q-1A':(wo)=>({id:'Q-1A',clause:'NIT Cl. 24.iii.B(k)',title:'CC — GST Amount Not Specified',
    text:`The Completion Certificate submitted for WO No. ${wo.num||'[WO No.]'} mentions an executed value of ${toLacN(wo.exec)}. It is not clear whether this value is inclusive or exclusive of GST/Service Tax.\n\nAs required under NIT Cl. 24.iii.B(k), please submit either:\n(a) A revised CC clearly mentioning the GST component separately, or\n(b) A separate certificate from the end-client confirming the GST amount included in the executed value.\n\nNote: Until clarification is received, the stated amount is being treated as inclusive of GST as per Cl. 24.iii.B(j).`}),
  'Q-1B':(wo)=>({id:'Q-1B',clause:'NIT Cl. 24.iii.B(b)(2)',title:'CC — Completion Date Missing',
    text:`The Completion Certificate for WO No. ${wo.num||'[WO No.]'} does not state the date of completion of the work.\n\nAs per NIT Cl. 24.iii.B(b)(2), the Completion Certificate must state the date of completion. Please submit a revised or supplementary certificate from the end-client/EIC confirming the date of completion of the referenced job.`}),
  'Q-1C':(wo)=>({id:'Q-1C',clause:'NIT Cl. 24.iii.B(b)(3)',title:'Sub-Contract — End-User Certificate Missing',
    text:`WO No. ${wo.num||'[WO No.]'} appears to be a sub-contract WO issued by ${wo.owner||'[main contractor]'} as the main contractor.\n\nAs per NIT Cl. 24.iii.B(b)(3), for sub-contract experience, a certificate from the end-user/owner/consultant is required confirming that the main contractor had intimated them about the engagement of a sub-contractor, OR that the bidder was permitted as a sub-contractor. Please submit such a certificate for WO No. ${wo.num||'[WO No.]'}.`}),
  'Q-1D':(wo)=>({id:'Q-1D',clause:'NIT Cl. 24.iii.B(b)(1) &amp; (b)(2)',title:'Completion Certificate Not Submitted',
    text:`For WO No. ${wo.num||'[WO No.]'}, a Completion Certificate from the end-client/EIC has not been submitted, as required under NIT Cl. 24.iii.B(b)(2). Any payment certificate, running account (RA) bill, or invoice is NOT a substitute for the Completion Certificate.\n\nPlease submit a Completion Certificate issued by the end-client/owner/consultant/EIC mentioning:\n(a) Executed value inclusive of GST\n(b) Date of completion\n(c) Reference to WO No. ${wo.num||'[WO No.]'}`}),
  'Q-2A':(wo)=>{
    const parts=[];
    const points=[];
    if(wo.uncPlant||(!wo.uncPlant&amp;&amp;!wo.uncScope&amp;&amp;!wo.uncValue)){
      points.push(`(a) The nature and type of the plant/facility where the work was carried out — to establish that it qualifies as a plant type meeting the Cl. 11.3 definition for this tender (e.g., client profile, project description, or scope elaboration confirming the industry type).`);
    }
    if(wo.uncScope||(!wo.uncPlant&amp;&amp;!wo.uncScope&amp;&amp;!wo.uncValue)){
      points.push(`(b) The type of activity, equipment, and scope of work actually performed — specifically confirming whether the work included the activities/equipment specified in NIT Cl. 11.3 (e.g., Schedule of Rates / detailed Scope of Work document or a clarification letter from the client specifying the equipment/activities).`);
    }
    if(wo.uncValue||(!wo.uncPlant&amp;&amp;!wo.uncScope&amp;&amp;!wo.uncValue)){
      points.push(`(c) The executed value attributable specifically to the similar-nature scope as defined under NIT Cl. 11.3 — as per TBA General Note 4, only the value matching the similar nature of job can be considered. If the CC states a composite value, a separate certificate from the end-client/EIC confirming the value attributable to the qualifying scope is required.`);
    }
    const body=points.map((p,i)=>p).join('\n\n');
    return {id:'Q-2A',clause:'NIT Cl. 11.3 · TBA General Note 4',title:'Similar Nature — Clarification Required',
      text:`The Work Order / Completion Certificate for WO No. ${wo.num||'[WO No.]'} does not provide sufficient information to conclusively assess whether the work meets the Similar Nature definition under NIT Cl. 11.3.\n\nPlease submit documentary evidence / clarification addressing the following:\n\n${body}\n\nNote: All clarifications must be supported by documentary evidence from the end-client/EIC. Verbal confirmation or bidder's own letters are not sufficient for Similar Nature assessment.`};
  },
  'Q-2B':(wo)=>({id:'Q-2B',clause:'TBA General Note 4',title:'Composite WO — Bifurcation of Similar-Nature Value Required',
    text:`WO No. ${wo.num||'[WO No.]'} appears to cover scope beyond the similar nature defined in NIT Cl. 11.3. The Completion Certificate provides a composite executed value of ${toLacN(wo.exec)} without bifurcation.\n\nAs per TBA General Note 4, only the executed value matching the similar nature of job shall be entered. Please submit a certificate from the end-client/EIC separately confirming the executed value attributable specifically to the qualifying (similar-nature) scope of work under NIT Cl. 11.2.`}),
  'Q-3A':(wo)=>({id:'Q-3A',clause:'NIT Cl. 24.iii.B(a)',title:'WO Issued Outside QP — Completion Date Not Clear',
    text:`WO No. ${wo.num||'[WO No.]'} was issued on ${fmtDate(wo.date)}, which may be outside the 7-year qualifying period. However, as per NIT Cl. 24.iii.B(a), a WO issued prior to the qualifying period may still be considered if the job was completed or was in progress during the qualifying period.\n\nThe submitted CC does not clearly state the date of completion. Please submit documentary evidence confirming that work under WO No. ${wo.num||'[WO No.]'} was completed or was in progress on or after ${S.tender.qpFrom||'[QP Start Date]'}.`}),
  'Q-3B':(wo)=>({id:'Q-3B',clause:'NIT Cl. 24.iii.B(n)',title:'Foreign Currency — INR Conversion Required',
    text:`WO No. ${wo.num||'[WO No.]'} states the contract value in ${wo.cur||'[currency]'}. As per NIT Cl. 24.iii.B(n), the value must be converted to INR at the SBI bill selling rate on the date of WO issue (${fmtDate(wo.date)||'[WO date]'}).\n\nPlease submit:\n(a) The SBI bill selling rate for ${wo.cur||'[currency]'} on ${fmtDate(wo.date)||'[date]'} with supporting evidence (RBI/SBI exchange rate statement)\n(b) The resulting converted INR executed value as per the CC`}),
  'Q-3C':(wo)=>({id:'Q-3C',clause:'NIT Cl. 24.iii.B(b)(2) &amp; Cl. 24.iii.B(a)',title:'Running WO — No CC Submitted (Job Under Execution)',
    text:`WO No. ${wo.num||'[WO No.]'} dated ${fmtDate(wo.date)} submitted in support of PQC experience appears to be under execution, and no Completion Certificate has been submitted.\n\nIf this work has since been completed, please submit a Completion Certificate from the end-client/EIC confirming:\n(a) Date of completion\n(b) Executed value inclusive of GST\n(c) Reference to WO No. ${wo.num||'[WO No.]'}\n\nIf the work is still ongoing and a CC cannot be submitted at this stage, please confirm in writing — the WO will not be considered for PQC evaluation as executed value cannot be verified per Cl. 24.iii.B(b)(2).`}),
};

// genQ — see admin config section below for the full implementation

// ════════════════════════════════════════════════════════
// EVALUATION ENGINE
// ════════════════════════════════════════════════════════
function evaluateBidder(bi){
  const b=S.bidders[bi];
  const pqc=S.pqc;
  const queries=[];
  let forcedReject=false;
  let rejectReason='';

  // Sub-contracting violation
  if(S.tender.tsub==='No' &amp;&amp; b.sub==='Yes'){
    forcedReject=true;
    rejectReason='Sub-contracting indicated in bid — NIT Cl. 23.i prohibits sub-contracting. Unacceptable condition per Cl. 24.v.B(c). Not curable by query.';
  }

  // Per-WO checks
  const qualifyingWOs=[];
  for(const wo of b.wos){
    // Own plant exclusion — hard fail, no query
    if(isChkOn('CHK_OWN_PLANT') &amp;&amp; wo.own==='yes') continue;
    // Similar nature = No — always hard fail regardless of config
    if(wo.sim==='no') continue;
    // Completion date outside QP — hard fail (if date is provided)
    if(isChkOn('CHK_QP_EXCLUDE') &amp;&amp; wo.comp &amp;&amp; !inQP(wo.comp)) continue;

    let woQueryNeeded=false;

    // WO number / CC number mismatch
    if(isChkOn('CHK_WO_CC_NUM') &amp;&amp; wo.ccNum &amp;&amp; wo.ccNum.trim() &amp;&amp; wo.ccNum.trim()!==wo.num.trim()){
      queries.push(genQ('Q-1E',wo)); woQueryNeeded=true;
    }

    if(wo.cc==='no'){ if(isChkOn('CHK_NO_CC')){queries.push(genQ('Q-1D',wo));woQueryNeeded=true;}}
    if(wo.cc==='running'){ if(isChkOn('CHK_RUNNING_WO')){queries.push(genQ('Q-3C',wo));woQueryNeeded=true;}}
    if(wo.cc==='partial'){
      if(!wo.comp &amp;&amp; isChkOn('CHK_CC_DATE')) queries.push(genQ('Q-1B',wo));
      if(wo.gst==='no' &amp;&amp; isChkOn('CHK_GST_SILENT')) queries.push(genQ('Q-1A',wo));
      woQueryNeeded=true;
    }
    if(wo.cc==='yes'){
      if((wo.gst==='no'||wo.gst==='excl') &amp;&amp; isChkOn('CHK_GST_SILENT')) queries.push(genQ('Q-1A',wo));
      if(!wo.comp &amp;&amp; isChkOn('CHK_CC_DATE')) {queries.push(genQ('Q-1B',wo));woQueryNeeded=true;}
    }
    if(wo.subw==='yes-nocert' &amp;&amp; isChkOn('CHK_SUBCON_CERT')){queries.push(genQ('Q-1C',wo));woQueryNeeded=true;}
    // partial and unclear both trigger Q-2A
    if(wo.sim==='partial' &amp;&amp; isChkOn('CHK_SIM_PARTIAL')){queries.push(genQ('Q-2A',wo));woQueryNeeded=true;}
    else if(wo.sim==='unclear' &amp;&amp; isChkOn('CHK_SIM_UNCLEAR')){queries.push(genQ('Q-2A',wo));woQueryNeeded=true;}
    if(wo.bif==='no' &amp;&amp; isChkOn('CHK_BIFURCATION')){queries.push(genQ('Q-2B',wo));woQueryNeeded=true;}
    if(wo.cur!=='INR' &amp;&amp; isChkOn('CHK_CURRENCY')){queries.push(genQ('Q-3B',wo));}

    // Qualifying only if no blocking issues
    if(!woQueryNeeded &amp;&amp; wo.exec>0 &amp;&amp; (wo.cc==='yes'||wo.cc==='partial')){
      qualifyingWOs.push(wo);
    }
  }

  b.qualifyingWOs=qualifyingWOs;
  b.queries=queries;

  // PQC evaluation — 3 options (uses annualised exec value for ARC tenders)
  let pqcMet=false, pqcOption='', metOption='';
  if(!forcedReject){
    if(pqc.swo1>0){
      const best=Math.max(0,...qualifyingWOs.map(w=>effectiveExec(w)));
      if(best>=pqc.swo1){pqcMet=true;metOption='A';}
    }
    if(!pqcMet &amp;&amp; pqc.swo2>0){
      const elig=qualifyingWOs.filter(w=>effectiveExec(w)>=pqc.swo2);
      if(elig.length>=2){pqcMet=true;metOption='B';}
    }
    if(!pqcMet &amp;&amp; pqc.swo3>0){
      const elig=qualifyingWOs.filter(w=>effectiveExec(w)>=pqc.swo3);
      if(elig.length>=3){pqcMet=true;metOption='C';}
    }
    if(pqcMet) pqcOption=`Meeting PQC — Option ${metOption}`;
  }

  b.pqcMet=pqcMet;
  b.pqcOption=pqcOption;
  b.metOption=metOption; // track which option was met for matrix N/A logic

  // Verdict logic — ANY query = Query status (not Accepted)
  if(forcedReject){b.verdict='Rejected';b.rejectReason=rejectReason;}
  else if(queries.length>0){b.verdict='Query';b.rejectReason='';}  // Even if PQC met — queries take priority
  else if(pqcMet){b.verdict='Accepted';b.rejectReason='';}
  else{
    b.verdict='Rejected';
    b.rejectReason=buildRejectReason(b,qualifyingWOs);
  }

  updateProgress();
  updateQCount();
}

function buildRejectReason(b,qWOs){
  const pqc=S.pqc;
  const isARC=S.tender.tarc==='ARC';
  const annNote=isARC?' (annualised per-year value)':'';

  // No qualifying WOs at all — diagnose why
  if(!qWOs.length){
    const allWOs=b.wos;
    if(!allWOs.length) return 'No Work Orders submitted by this bidder.';
    const reasons=[];
    const ownPlant=allWOs.filter(w=>w.own==='yes').length;
    const notSimilar=allWOs.filter(w=>w.sim==='no').length;
    const outsideQP=allWOs.filter(w=>w.comp&amp;&amp;!inQP(w.comp)).length;
    const withQueries=allWOs.filter(w=>w.sim!=='no'&amp;&amp;w.own!=='yes'&amp;&amp;(!w.comp||inQP(w.comp))).length;
    if(ownPlant) reasons.push(`${ownPlant} WO(s) excluded — work carried out at bidder's own plant/project (Cl. 24.iii.B(l))`);
    if(notSimilar) reasons.push(`${notSimilar} WO(s) excluded — scope does not meet Similar Nature definition under NIT Cl. 11.3`);
    if(outsideQP) reasons.push(`${outsideQP} WO(s) excluded — completion date falls outside the 7-year qualifying period (Cl. 24.iii.B(a))`);
    if(withQueries) reasons.push(`${withQueries} WO(s) pending clarification (queries raised) — cannot be counted until query response received`);
    return 'No qualifying Work Orders after evaluation. ' + (reasons.join('; ') || 'All submitted WOs failed eligibility checks.');
  }

  // Qualifying WOs exist but values fall short — give specific gap for each option
  const parts=[];
  if(pqc.swo1>0){
    const best=Math.max(0,...qWOs.map(w=>effectiveExec(w)));
    if(best<pqc.swo1) parts.push(`Option A: Highest qualifying executed value${annNote} is ${toLacN(best)}, which is below the required ${toLacN(pqc.swo1)} — shortfall of ${toLacN(pqc.swo1-best)}`);
  }
  if(pqc.swo2>0){
    const elig=qWOs.filter(w=>effectiveExec(w)>=pqc.swo2).length;
    if(elig<2) parts.push(`Option B: Only ${elig} qualifying WO(s) meet the ${toLacN(pqc.swo2)}${annNote} threshold — 2 are required`);
  }
  if(pqc.swo3>0){
    const elig=qWOs.filter(w=>effectiveExec(w)>=pqc.swo3).length;
    if(elig<3) parts.push(`Option C: Only ${elig} qualifying WO(s) meet the ${toLacN(pqc.swo3)}${annNote} threshold — 3 are required`);
  }
  if(!parts.length) return 'Does not meet PQC requirements — NIT Cl. 11.2.';
  return 'Does not meet PQC under any option. ' + parts.join('. ') + '.';
}

        <div class=&quot;wo-field&quot;><div class=&quot;wfl&quot;>CC Executed Value</div><strong style=&quot;font-family:var(--mono);color:var(--accent)&quot;>${toLacN(wo.exec)}</strong></div>
        <div class=&quot;wo-field&quot;><div class=&quot;wfl&quot;>CC Completion Date</div><span style=&quot;${wo.comp&amp;&amp;!inQP(wo.comp)?'color:var(--red);font-weight:700':''}&quot;>${fmtDate(wo.comp)}</span></div>
        ${S.tender.tarc==='ARC'&amp;&amp;wo.exec&amp;&amp;wo.date&amp;&amp;wo.comp?`<div class=&quot;wo-field&quot;><div class=&quot;wfl&quot;>Annualised Value</div><strong style=&quot;font-family:var(--mono);color:var(--pur)&quot;>${toLacN(effectiveExec(wo))}/yr</strong></div>`:''}
        <div class=&quot;wo-field&quot;><div class=&quot;wfl&quot;>CC Status</div>${ccTag(wo.cc)}</div>

        ${wo.ccNum&amp;&amp;wo.ccNum.trim()?`<div class=&quot;wo-field&quot; style=&quot;grid-column:1/-1&quot;><div class=&quot;wfl&quot;>WO No. in CC</div><span style=&quot;font-family:var(--mono);font-size:11px;${wo.ccNum.trim()!==wo.num.trim()?'color:var(--red);font-weight:700':''}&quot;>${wo.ccNum}${wo.ccNum.trim()!==wo.num.trim()?' ⚠ Mismatch with WO No.':' ✓ Matches'}</span></div>`:''}

function toggleWO(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':'none';}

function ccTag(v){const m={yes:'<span class=&quot;tag t-yes&quot;>✓ Submitted</span>',no:'<span class=&quot;tag t-no&quot;>✗ Missing</span>',partial:'<span class=&quot;tag t-wrn&quot;>⚠ Incomplete</span>',running:'<span class=&quot;tag t-qry&quot;>Running WO</span>'};return m[v]||'—';}
function simTag(v){
  const m={
    yes:'<span class=&quot;tag t-yes&quot;>✓ Fully Meets Cl. 11.3</span>',
    partial:'<span class=&quot;tag t-wrn&quot;>⚠ Conditionally Qualifies — Partial Match</span>',
    unclear:'<span class=&quot;tag t-qry&quot;>? Unclear — Insufficient Info</span>',
    no:'<span class=&quot;tag t-no&quot;>✗ Does Not Meet Cl. 11.3</span>'
  };
  return m[v]||'—';
}

function getWOIssues(wo){
  const iss=[];
  if(wo.own==='yes') iss.push({cls:'a-err',icon:'🚫',msg:'<strong>Own Plant/Project:</strong> Work done for bidder\'s own plant excluded per Cl. 24.iii.B(l). Cannot count for PQC.'});
  if(wo.cur!=='INR') iss.push({cls:'a-wrn',icon:'💱',msg:`<strong>Foreign Currency (${wo.cur}):</strong> Must convert to INR at SBI bill selling rate on WO date — Cl. 24.iii.B(n). Query Q-3B will be raised.`});
  if(wo.ccNum&amp;&amp;wo.ccNum.trim()&amp;&amp;wo.ccNum.trim()!==wo.num.trim()) iss.push({cls:'a-wrn',icon:'🔢',msg:`<strong>WO / CC Number Mismatch:</strong> WO bears No. <em>${wo.num}</em> but the Completion Certificate references No. <em>${wo.ccNum}</em>. Query Q-1E raised to confirm they relate to the same scope of work — Cl. 24.iii.B(b)(1).`});
  if(wo.cc==='no') iss.push({cls:'a-wrn',icon:'📄',msg:'<strong>No CC Submitted:</strong> Mandatory per Cl. 24.iii.B(b)(2). Query Q-1D raised regardless of WO value.'});
  if(wo.cc==='running') iss.push({cls:'a-wrn',icon:'🔄',msg:'<strong>Running WO:</strong> No CC yet. Query Q-3C raised. If job completed — submit CC for evaluation. If still running — WO cannot count for PQC.'});
  if(wo.cc==='partial') iss.push({cls:'a-wrn',icon:'⚠',msg:'<strong>Incomplete CC:</strong> Queries raised for missing elements.'});
  if((wo.gst==='no'||wo.gst==='excl')&amp;&amp;(wo.cc==='yes'||wo.cc==='partial')) iss.push({cls:'a-wrn',icon:'📊',msg:`<strong>GST ${wo.gst==='excl'?'stated as ex-GST':'not specified'} in CC:</strong> Query Q-1A raised. Per Cl. 24.iii.B(j) — treated as inclusive until clarified.`});
  if(wo.subw==='yes-nocert') iss.push({cls:'a-wrn',icon:'🔗',msg:'<strong>Sub-contract — No End-User Cert:</strong> Cl. 24.iii.B(b)(3) requires end-user certificate confirming sub-contracting was permitted. Query Q-1C raised.'});
  if(wo.bif==='no') iss.push({cls:'a-wrn',icon:'📐',msg:'<strong>Composite CC — No Bifurcation:</strong> TBA Note 4 — only similar-nature portion\'s value to be entered. Query Q-2B raised for client bifurcation certificate.'});
  if(wo.sim==='partial') iss.push({cls:'a-wrn',icon:'🔍',msg:'<strong>Conditionally Qualifies — Partial Scope Match:</strong> Job description shares some keywords/activities with NIT Cl. 11.3 but does not fully satisfy the definition. Query Q-2A raised for documentary confirmation of the qualifying scope and its executed value.'});
  if(wo.sim==='unclear') iss.push({cls:'a-wrn',icon:'🔍',msg:'<strong>Similar Nature Unclear:</strong> Insufficient information to assess against NIT Cl. 11.3. Query Q-2A raised covering all applicable gaps.'});
  if(wo.sim==='no') iss.push({cls:'a-err',icon:'✗',msg:'<strong>Does Not Meet Similar Nature:</strong> Scope does not satisfy NIT Cl. 11.3 definition. Excluded from PQC evaluation — not curable by query.'});
  if(wo.comp&amp;&amp;!inQP(wo.comp)) iss.push({cls:'a-err',icon:'📅',msg:`<strong>Outside Qualifying Period:</strong> Completion date ${fmtDate(wo.comp)} is before the 7-year QP start. WO excluded. Only completion date matters — WO issue date is irrelevant per Cl. 24.iii.B(a).`});
  if(!wo.comp&amp;&amp;wo.cc==='yes') iss.push({cls:'a-wrn',icon:'📅',msg:'<strong>Completion Date Missing in CC:</strong> Cl. 24.iii.B(b)(2). Query Q-1B raised.'});
  if(!iss.length) iss.push({cls:'a-ok',icon:'✓',msg:'No issues detected with this WO.'});
  return iss;
}

function renderQBox(bi,qi,q){
  if(!q) return '';
  const edited=!!q.editedText;
  const displayText=edited?q.editedText:q.text;
  const editAreaId=`qedit-${bi}-${qi}`;
  const textareaId=`qta-${bi}-${qi}`;
  return `
  <div class=&quot;qbox ${edited?'edited':''}&quot; id=&quot;qbox-${bi}-${qi}&quot;>
    <div class=&quot;qlbl&quot;>${q.id} — ${q.title}${edited?' <span style=&quot;font-size:9px;opacity:.7&quot;>(EDITED)</span>':''}</div>
    <div class=&quot;qtext&quot; id=&quot;qdisplay-${bi}-${qi}&quot;>${displayText}</div>
    <div class=&quot;qclause&quot;>📋 Clause: ${q.clause}</div>
    <div class=&quot;q-actions&quot;>
      <button class=&quot;q-copy&quot; onclick=&quot;copyText(\`${displayText.replace(/`/g,'\\`')}\`)&quot;>📋 Copy</button>
      <button class=&quot;q-edit&quot; onclick=&quot;toggleQEdit(${bi},${qi})&quot;>✏ ${edited?'Re-edit':'Edit Query'}</button>
      ${edited?`<button class=&quot;q-reset&quot; onclick=&quot;resetQ(${bi},${qi})&quot;>↩ Restore Original</button>`:''}
    </div>
    <div class=&quot;q-edit-area&quot; id=&quot;${editAreaId}&quot;>
      <div style=&quot;font-family:var(--mono);font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:700&quot;>⚠ Editing query text — standard template preserved separately</div>
      <textarea id=&quot;${textareaId}&quot; rows=&quot;8&quot;>${displayText}</textarea>
      <div style=&quot;display:flex;gap:7px;margin-top:7px&quot;>
        <button class=&quot;btn b-gld b-sm&quot; onclick=&quot;saveQEdit(${bi},${qi})&quot;>✓ Save Edit</button>
        <button class=&quot;btn b-out b-sm&quot; onclick=&quot;toggleQEdit(${bi},${qi})&quot;>Cancel</button>
      </div>
    </div>
  </div>`;
}

function toggleQEdit(bi,qi){
  const el=document.getElementById(`qedit-${bi}-${qi}`);
  el.classList.toggle('open');
}
function saveQEdit(bi,qi){
  const ta=document.getElementById(`qta-${bi}-${qi}`);
  S.bidders[bi].queries[qi].editedText=ta.value;
  evaluateBidder(bi);
  renderEvalBidder(bi);
  toast('Query text saved ✓','ok');
  autoSave();
}
function resetQ(bi,qi){
  S.bidders[bi].queries[qi].editedText=null;
  evaluateBidder(bi);
  renderEvalBidder(bi);
  toast('Query restored to standard template','ok');
  autoSave();
}

function copyAllQ(){
