// FILE SYSTEM ACCESS API — LINK TO FILE (persistent auto-save)
// ════════════════════════════════════════════════════════
const FSA_SUPPORTED = 'showOpenFilePicker' in window;
let linkedFileHandle = null;
let _fsaTimer = null;

// IndexedDB — persist the file handle across page refreshes
const _IDB = { name:'tba_tool_v3', store:'handles', key:'linkedFile' };
function _openIDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(_IDB.name,1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(_IDB.store);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}
async function _saveHandleIDB(h){ try{ const db=await _openIDB(); db.transaction(_IDB.store,'readwrite').objectStore(_IDB.store).put(h,_IDB.key); }catch(e){ console.warn('[TBA] _saveHandleIDB failed:',e); } }
async function _loadHandleIDB(){ try{ const db=await _openIDB(); return new Promise(r=>{ const req=db.transaction(_IDB.store,'readonly').objectStore(_IDB.store).get(_IDB.key); req.onsuccess=e=>r(e.target.result||null); req.onerror=()=>r(null); }); }catch(e){ return null; } }
async function _clearHandleIDB(){ try{ const db=await _openIDB(); db.transaction(_IDB.store,'readwrite').objectStore(_IDB.store).delete(_IDB.key); }catch(e){ console.warn('[TBA] _clearHandleIDB failed:',e); } }

function updateFileBadge(){
  const b=document.getElementById('fileBadge');
  if(!b) return;
  if(linkedFileHandle){ b.textContent='🔗 '+linkedFileHandle.name; b.style.display='inline-flex'; }
  else { b.style.display='none'; }
}

// Debounced write to linked file — called from autoSave
function autoSaveToFile(){
  if(!linkedFileHandle) return;
  clearTimeout(_fsaTimer);
  _fsaTimer=setTimeout(()=>writeSessionToFile(true),K.DEBOUNCE_MS);
}

async function writeSessionToFile(silent=false){
  if(!linkedFileHandle) return;
  try{
    const perm=await linkedFileHandle.queryPermission({mode:'readwrite'});
    if(perm!=='granted'){
      const req=await linkedFileHandle.requestPermission({mode:'readwrite'});
      if(req!=='granted'){ toast('File permission denied — click 📎 Link File to re-grant','warn'); return; }
    }
    const data={_ver:'v3',_ts:new Date().toISOString(),...S};
    const writable=await linkedFileHandle.createWritable();
    await writable.write(JSON.stringify(data,null,2));
    await writable.close();
    if(!silent) toast('Saved → '+linkedFileHandle.name,'ok');
    updateFileBadge();
  }catch(e){ toast('File save failed: '+e.message,'warn'); }
}

async function linkFile(){
  if(!FSA_SUPPORTED){ toast('Use Chrome/Edge for file linking','warn'); return; }
  let handle;
  try{ [handle]=await window.showOpenFilePicker({ types:[{description:'TBA JSON',accept:{'application/json':['.json']}}], multiple:false }); }
  catch(e){ if(e.name!=='AbortError') toast('Could not open file picker','warn'); return; }
  linkedFileHandle=handle;
  await _saveHandleIDB(handle);
  try{
    const file=await handle.getFile();
    const data=JSON.parse(await file.text());
    if(data.tender||data.bidders){
      if(confirm('Load data from '+handle.name+' into the current session?')) restoreState(data);
    }
    toast('Linked to '+handle.name+' — auto-save active');
  }catch(e){ toast('Linked to '+handle.name+' (will write on next save)'); }
  updateFileBadge();
}

async function linkNewFile(){
  if(!FSA_SUPPORTED){ toast('Use Chrome/Edge for file linking','warn'); return; }
  let handle;
  try{ handle=await window.showSaveFilePicker({ suggestedName:`TBA_${S.tender.tno||'session'}.json`, types:[{description:'TBA JSON',accept:{'application/json':['.json']}}] }); }
  catch(e){ if(e.name!=='AbortError') toast('Could not open file picker','warn'); return; }
  linkedFileHandle=handle;
  await _saveHandleIDB(handle);
  await writeSessionToFile(false);
  updateFileBadge();
}

async function unlinkFile(){
  linkedFileHandle=null;
  await _clearHandleIDB();
  updateFileBadge();
  toast('File unlinked — data still in browser localStorage');
}

async function restoreLinkedFile(){
  if(!FSA_SUPPORTED) return;
  const handle=await _loadHandleIDB();
  if(!handle) return;
  const perm=await handle.queryPermission({mode:'readwrite'});
  if(perm==='granted'){
    linkedFileHandle=handle;
    try{
      const file=await handle.getFile();
      const data=JSON.parse(await file.text());
      if(data.tender||data.bidders){ restoreState(data); toast('Auto-loaded from '+handle.name); }
    }catch(e){ console.warn('[TBA] restoreLinkedFile read failed:',e); toast('Could not auto-load linked file — it may have moved or been renamed','warn'); }
    updateFileBadge();
  } else {
    linkedFileHandle=handle; // badge shows but no auto-read until user interacts
    updateFileBadge();
  }
}

function showFileMenu(){
  const unlinkRow=document.getElementById('unlinkRow');
  const fsaWarn=document.getElementById('fsaWarning');
  if(!FSA_SUPPORTED) fsaWarn.style.display='block';
  else fsaWarn.style.display='none';
  if(linkedFileHandle){
    unlinkRow.style.display='block';
    document.getElementById('linkedFileName').textContent=linkedFileHandle.name;
  } else { unlinkRow.style.display='none'; }
  document.getElementById('file-modal').style.display='flex';
}
function closeFileModal(){ document.getElementById('file-modal').style.display='none'; }

function loadExcelJS(cb){
  if(window.ExcelJS){ cb(); return; }
  toast('Loading Excel library…','warn');
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js';
  s.integrity='sha384-rRoXxn2yHlrZYB587Ki9RO1tONhLdM6XfORg7Rw4uwH4/Fh/5nP7IUX91bkaKUgs';
  s.crossOrigin='anonymous';
  s.onload=cb;
  s.onerror=()=>toast('Failed to load Excel library — check connection','warn');
  document.head.appendChild(s);
}

function exportExcel(){ loadExcelJS(()=>doExportExcel()); }

async function doExportExcel(){
  const t=S.tender; const pqc=S.pqc;

  // ── colour palette
  const NAVY='1C2B3A', WHITE='FFFFFF', GREY='F1F5F9', GREY2='E2E8F0',
        INK='1E293B',  INK2='475569',
        GRN_BG='F0FDF4', GRN_FG='166534',
        RED_BG='FEF2F2', RED_FG='991B1B',
        GLD_BG='FFFBEB', GLD_FG='92400E',
        PUR_BG='F5F3FF', PUR_FG='5B21B6',
        BLU_BG='EFF6FF', BLU_FG='1E3A8A';

  const thin={style:'thin',color:{argb:'FFE2E8F0'}};
  const med ={style:'medium',color:{argb:'FF94A3B8'}};
  const allThin={top:thin,bottom:thin,left:thin,right:thin};
  const allMed ={top:med, bottom:med, left:med, right:med };

  function fill(hex){ return {type:'pattern',pattern:'solid',fgColor:{argb:'FF'+hex}}; }
  function font(hex,bold=false,sz=9){ return {name:'Arial',size:sz,bold,color:{argb:'FF'+hex}}; }
  function align(h='left',v='middle',wrap=false){ return {horizontal:h,vertical:v,wrapText:wrap}; }

  function verdictStyle(v){
    const vl=(v||'').toLowerCase();
    if(vl==='accepted') return {bg:GRN_BG,fg:GRN_FG};
    if(vl==='rejected') return {bg:RED_BG,fg:RED_FG};
    if(vl==='query')    return {bg:PUR_BG,fg:PUR_FG};
    return {bg:GREY,fg:INK2};
  }

  const wb=new ExcelJS.Workbook();
  wb.creator='TBA Evaluator v3 — IOCL'; wb.created=new Date();

  // ══════════════════════════════════════════
  // SHEET 1 — TBA HEADER
  // ══════════════════════════════════════════
  const ws1=wb.addWorksheet('TBA Header');
  ws1.pageSetup={paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0};
  ws1.columns=[{width:36},{width:72}];

  function hdrRow(ws,text,bg=NAVY,fg=WHITE,sz=12){
    const r=ws.addRow([text]);
    ws.mergeCells(r.number,1,r.number,2);
    const c=r.getCell(1);
    c.fill=fill(bg); c.font=font(fg,true,sz);
    c.alignment=align('left','middle'); c.border=allMed;
    r.height=sz===12?24:18;
    return r;
  }
  function kvRow(ws,k,v){
    const r=ws.addRow([k,v]);
    r.height=16;
    const kc=r.getCell(1); kc.fill=fill(GREY); kc.font=font(INK2,true,9);
    kc.border=allThin; kc.alignment=align('left','middle');
    const vc=r.getCell(2); vc.font=font(INK,false,9);
    vc.border=allThin; vc.alignment=align('left','middle',true);
    return r;
  }

  hdrRow(ws1,'IOCL — TECHNO-COMMERCIAL BID ANALYSIS (TBA)',NAVY,WHITE,12);
  ws1.addRow([]).height=4;
  hdrRow(ws1,'TENDER DETAILS',NAVY,WHITE,9);
  kvRow(ws1,'Tender No.',t.tno||'—');
  kvRow(ws1,'TBA Type',t.ttype||'—');
  kvRow(ws1,'Name of Work',t.tname||'—');
  kvRow(ws1,'ARC / Non-ARC',t.tarc||'—');
  kvRow(ws1,'Total Bids Received',t.tbids||'—');
  kvRow(ws1,'Critical Job (Cl. 22)?',t.tcrit||'No');
  kvRow(ws1,'Sub-contracting Permitted?',t.tsub||'No');
  kvRow(ws1,'Original Bid Submission End Date',t.torig||'—');
  kvRow(ws1,'Extended Bid Date (reference)',t.text||'N/A');
  kvRow(ws1,'Qualifying Period — From',t.qpFrom||'—');
  kvRow(ws1,'Qualifying Period — To',t.qpTo||'—');
  ws1.addRow([]).height=4;
  hdrRow(ws1,'PQC CRITERIA — NIT Cl. 11.2',NAVY,WHITE,9);
  kvRow(ws1,'Similar Nature of Job (Cl. 11.3)',t.tsim||'—');
  kvRow(ws1,'SWO Option A — 1 job ≥ (₹ Lacs)',pqc.swo1?(pqc.swo1/K.LACS).toFixed(2)+' L':'—');
  kvRow(ws1,'SWO Option B — 2 jobs each ≥ (₹ Lacs)',pqc.swo2?(pqc.swo2/K.LACS).toFixed(2)+' L':'—');
  kvRow(ws1,'SWO Option C — 3 jobs each ≥ (₹ Lacs)',pqc.swo3?(pqc.swo3/K.LACS).toFixed(2)+' L':'—');
  kvRow(ws1,'Additional PQC (Cl. 12)',pqc.addl||'NIL');
  if(t.tarc==='ARC'){
    ws1.addRow([]).height=4;
    hdrRow(ws1,'ARC ANNUALISATION — NIT Cl. 21',NAVY,WHITE,9);
    kvRow(ws1,'Annualisation Basis',pqc.arcBasis==='full'?'Full value credited':'Pro-rata (exec ÷ WO duration)');
    kvRow(ws1,'Annualisation Method',pqc.arcBasis==='full'?'Full value credited (no annualisation)':'Pro-rata — exec value ÷ actual work duration (commencement → completion)');
  }
  ws1.views=[{state:'frozen',xSplit:0,ySplit:1}];

  // ══════════════════════════════════════════
  // SHEET 2 — EVALUATION
  // ══════════════════════════════════════════
  const ws2=wb.addWorksheet('Evaluation');
  ws2.pageSetup={paperSize:9,orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0};
  ws2.columns=[
    {width:5},{width:30},{width:14},{width:8},{width:20},{width:14},

    {width:14},{width:9},{width:13},{width:22},{width:14},{width:9},

function toast(msg,type='ok'){
  const el=document.createElement('div');
  const colors={ok:'background:#f0fdf4;border:1px solid #bbf7d0;color:#166534',warn:'background:#fff7ed;border:1px solid #fed7aa;color:#9a3412',err:'background:#fef2f2;border:1px solid #fecaca;color:#991b1b'};
  el.style.cssText=`position:fixed;top:64px;right:22px;z-index:9999;padding:10px 18px;border-radius:5px;font-size:13px;font-family:var(--mono);pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:opacity .3s;${colors[type]||colors.ok}`;
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),K.TOAST_FADE_MS);},K.TOAST_MS);
}

function updateProgress(){
  const ev=S.bidders.filter(b=>b.verdict!=='pending').length;

}

function loadSession(evt){
  const file=evt.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.tender&amp;&amp;!data.bidders) throw new Error('Invalid session file');
      if(!confirm('Loading this session will replace all current data. Continue?')) return;
      restoreState(data);
      toast('Session loaded: '+file.name,'ok');
    }catch(err){toast('Invalid session file — '+err.message,'err');}
  };
  reader.readAsText(file);
  evt.target.value=''; // allow re-loading same file
}

function restoreState(data){
  S.tender=data.tender||{};
  S.pqc=data.pqc||{};
  S.bidders=data.bidders||[];
  S.curBidder=data.curBidder||0;
  // Restore form fields — Tender
  const t=S.tender;
  setV('f-tno',t.tno);setV('f-tname',t.tname);setV('f-tsim',t.tsim);setV('f-tbids',t.tbids);
  setV('f-torig',t.torig);setV('f-text',t.text);
  setSel('f-ttype',t.ttype);setSel('f-tarc',t.tarc);setSel('f-tcrit',t.tcrit);setSel('f-tsub',t.tsub);
  if(t.torig) calcQP();
  const sbChip=document.getElementById('sb-chip'); if(sbChip) sbChip.textContent=t.tno||'No Tender Loaded';
  const tbTxt=document.getElementById('tb-txt'); if(tbTxt) tbTxt.textContent=t.tno||'Configured';
  // PQC
  const p=S.pqc;
  setV('p-swo1',p.swo1||'');setV('p-swo2',p.swo2||'');setV('p-swo3',p.swo3||'');
  setV('p-addl',p.addl||'');
  setSel('p-arc-basis',p.arcBasis||'prorate');
  pqcHints();

  // Re-evaluate all bidders
  S.bidders.forEach((_,i)=>evaluateBidder(i));

}

function toggleARCPanel(){
  const isARC=S.tender.tarc==='ARC'||(document.getElementById('f-tarc')&amp;&amp;document.getElementById('f-tarc').value==='ARC');
  const panel=document.getElementById('arc-panel');
  if(panel) panel.style.display=isARC?'block':'none';
}

// Returns the effective exec value for PQC comparison (annualised if ARC)
// Duration = work commencement date (wo.date) to actual completion date (wo.comp)
function effectiveExec(wo){
  const basis=S.pqc.arcBasis||'prorate';
  const isARC=S.tender.tarc==='ARC';
  if(!isARC||basis==='full'||!wo.exec) return wo.exec;
  // Annualise based on work commencement (WO issue date) → actual completion date
  if(!wo.date||!wo.comp) return wo.exec; // can't prorate — use full value
  const start=new Date(wo.date);   // work commencement date
  const end=new Date(wo.comp);     // actual completion date from CC
  const durYears=(end-start)/(1000*60*60*24*365.25);
  if(durYears<=0) return wo.exec;
  // Annualised per-year value; do NOT cap at ARC duration — use actual period
  return wo.exec/durYears;
}

// ── Password hashing (SHA-256 via Web Crypto)
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
// Default password hash for 'admin123' — computed once
const DEFAULT_PW_HASH = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';

function loadCFG(){
  try{
    const raw = localStorage.getItem('tba_v3_cfg');
    if(raw) CFG = {...CFG, ...JSON.parse(raw)};
  }catch(e){ console.warn('[TBA] loadCFG failed — using defaults:',e); }
}
function saveCFG(){
  localStorage.setItem('tba_v3_cfg', JSON.stringify(CFG));
}

// ── Helpers: get effective clause / check state / query meta
function getCl(key){ return CFG.clauses[key] || DEFAULT_CLAUSES[key]?.val || key; }
function isCheckEnabled(key){
  if(CFG.checks[key] &amp;&amp; CFG.checks[key].enabled === false) return false;
  return true; // default on
}
function getQMeta(id){
  const custom = CFG.queries[id] || {};
  const def = DEFAULT_QUERY_META[id] || {};
  return {
    enabled: custom.enabled !== false, // default enabled
    title:   custom.customTitle  || def.title   || id,
    clause:  custom.customClause || def.clause  || '',
    text:    custom.customText   || null, // null = use QT function
  };
}

// ── Auth
async function adminLogin(){
  const pw = document.getElementById('admin-pw-input').value;
  if(!pw){ toast('Enter password','warn'); return; }
  const hash = await sha256(pw);
  const storedHash = CFG.pwHash || DEFAULT_PW_HASH;
  if(hash === storedHash){
    _adminUnlocked = true;
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('admin-pw-input').value = '';
    renderAdminPanel();
    toast('Admin access granted','ok');
  } else {
    toast('Incorrect password','err');
    document.getElementById('admin-pw-input').value = '';
  }
}
function adminLogout(){
  _adminUnlocked = false;
  document.getElementById('admin-lock').style.display = 'block';
  document.getElementById('admin-panel').style.display = 'none';
  toast('Admin panel locked','ok');
}
function showChangePwModal(){ document.getElementById('pw-modal').style.display='flex'; }
async function changeAdminPassword(){
  const cur = document.getElementById('pw-cur').value;
  const nw  = document.getElementById('pw-new').value;
  const cfm = document.getElementById('pw-cfm').value;
  if(!cur||!nw||!cfm){ toast('Fill all fields','warn'); return; }
  if(nw !== cfm){ toast('New passwords do not match','warn'); return; }
  if(nw.length < 6){ toast('Password must be at least 6 characters','warn'); return; }
  const curHash = await sha256(cur);
  const storedHash = CFG.pwHash || DEFAULT_PW_HASH;
  if(curHash !== storedHash){ toast('Current password incorrect','err'); return; }
  CFG.pwHash = await sha256(nw);
  saveCFG();
  document.getElementById('pw-modal').style.display='none';
  ['pw-cur','pw-new','pw-cfm'].forEach(id=>document.getElementById(id).value='');
  toast('Password changed ✓','ok');
}

function switchCfgTab(tabId, btn){
  document.querySelectorAll('.cfg-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.cfg-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  btn.classList.add('active');
}

// ── Update functions
function updateClause(key, val){
  const def = DEFAULT_CLAUSES[key]?.val;
  if(val.trim() === def || !val.trim()){ delete CFG.clauses[key]; }
  else { CFG.clauses[key] = val.trim(); }
  saveCFG();
  renderClausesTab();
  toast('Clause updated ✓ — re-save PQC to apply to TBA preview','ok');
}
function resetClause(key){ delete CFG.clauses[key]; saveCFG(); renderClausesTab(); toast('Clause reset to default','ok'); }
function resetAllClauses(){ if(!confirm('Reset ALL clause references to defaults?')) return; CFG.clauses={}; saveCFG(); renderClausesTab(); toast('All clauses reset','ok'); }

function toggleQuery(id, enabled){
  if(!CFG.queries[id]) CFG.queries[id]={};
  CFG.queries[id].enabled = enabled;
  saveCFG();
  // Re-evaluate all bidders since a query toggle changes verdicts
  S.bidders.forEach((_,i)=>evaluateBidder(i));
  updateProgress();
  renderQueriesTab();
  toast((enabled?'Query '+id+' enabled':'Query '+id+' disabled — will no longer be raised'),'ok');
}
function updateQueryTitle(id, val){
  if(!CFG.queries[id]) CFG.queries[id]={};
  const def = DEFAULT_QUERY_META[id]?.title;
  if(val.trim()===def||!val.trim()) delete CFG.queries[id].customTitle;
  else CFG.queries[id].customTitle = val.trim();
  saveCFG(); renderQueriesTab();
}
function updateQueryClause(id, val){
  if(!CFG.queries[id]) CFG.queries[id]={};
  const def = DEFAULT_QUERY_META[id]?.clause;
  if(val.trim()===def||!val.trim()) delete CFG.queries[id].customClause;
  else CFG.queries[id].customClause = val.trim();
  saveCFG(); renderQueriesTab();
}
function updateQueryText(id, val){
  if(!CFG.queries[id]) CFG.queries[id]={};
  if(!val.trim()) delete CFG.queries[id].customText;
  else CFG.queries[id].customText = val;
  saveCFG(); renderQueriesTab();
}
function resetQueryText(id){
  if(CFG.queries[id]) delete CFG.queries[id].customText;
  saveCFG();
  S.bidders.forEach((_,i)=>evaluateBidder(i));
  renderQueriesTab();
  toast('Query text reset to default','ok');
}
function resetQueryAll(id){
  delete CFG.queries[id];
  saveCFG();
  S.bidders.forEach((_,i)=>evaluateBidder(i));
  renderQueriesTab();
  toast('Query '+id+' fully reset','ok');
}

function toggleCheck(key, enabled){
  if(!CFG.checks[key]) CFG.checks[key]={};
  CFG.checks[key].enabled = enabled;
  saveCFG();
  S.bidders.forEach((_,i)=>evaluateBidder(i));
  updateProgress();
  renderChecksTab();
  toast((enabled?'Check enabled':'Check disabled — engine updated'),'ok');
}

// ════════════════════════════════════════════════════════
// UPDATED genQ — respects CFG toggles and custom text/meta
// ════════════════════════════════════════════════════════
function genQ(code, wo){
  const meta = getQMeta(code);
  if(!meta.enabled) return null; // suppressed by admin

  // Build base query from QT function
  const fn = QT[code];
  if(!fn) return null;
  const base = fn(wo);

  // Apply any admin overrides
  const result = {
    ...base,
    id:     code,
    title:  meta.title,
    clause: meta.clause,
    editedText: null,
    woNum:  wo.num,
  };
  // If admin has set custom text, use it (with placeholder substitution)
  if(meta.text){
    let t = meta.text;
    t = t.replace(/\{WO_NUM\}/g,   wo.num||'[WO No.]');
    t = t.replace(/\{EXEC_VAL\}/g, toLacN(wo.exec)||'[value]');
    t = t.replace(/\{OWNER\}/g,    wo.owner||'[client]');
    t = t.replace(/\{QP_FROM\}/g,  S.tender.qpFrom||'[QP Start]');
    t = t.replace(/\{CURRENCY\}/g, wo.cur||'[currency]');
    t = t.replace(/\{WO_DATE\}/g,  fmtDate(wo.date)||'[WO date]');
    t = t.replace(/\{CC_NUM\}/g,   wo.ccNum||'[CC WO No.]');
    // For Q-2A, append the dynamic points after the custom preamble
    if(code==='Q-2A') result.text = t + '\n\n' + base.text.split('\n\n').slice(2).join('\n\n');
    else result.text = t;
  }
  return result;
}

});

<!-- WHAT IS TBA -->
<section id=&quot;what-is-tba&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Foundation</div>
  <h2 class=&quot;section-title&quot;>What is a Technical Bid Analysis?</h2>
  <p class=&quot;section-lead&quot;>The TBA is the formal document through which an evaluator certifies whether each bidder meets the Pre-Qualification Criteria (PQC) set out in the NIT — before their price bid is even opened.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-1&quot;>Core Purpose</div>
    <p>IOCL conducts a <strong>Two-Bid System</strong> for most service contracts (NIT Cl. 2b). In Bid Part-I (Techno-Commercial), the evaluator checks eligibility. Only bidders who clear the TBA have their Price Bid (Part-II/BOQ) opened. This protects IOCL from awarding technically unqualified contractors on the basis of low price alone.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-1&quot;>Cl. 2b</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-1&quot;>Type of Bid: <strong>Under Two Bid System</strong>. Techno-commercial bid is evaluated first; priced bid opening date will be available on tendering portal only after techno-commercial clearance.</div>
  </div>
  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-2&quot;>Cl. 24.i</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-2&quot;><strong>Provisions/Conditions stipulated in NIT supersede all sections of the Tender document.</strong> Therefore the TBA evaluator must always apply the NIT, not any general impression.</div>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-1&quot;>💡 Key Principle</div>
    <p>The TBA format (Excel sheet) is the structured tool to document and justify each decision. Every column exists because a NIT clause demands that data point. Nothing in the format is bureaucratic — it is legally mandated evidence.</p>
  </div>
</section>

<!-- EVALUATION FLOW -->
<section id=&quot;evaluation-flow&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Process Map</div>
  <h2 class=&quot;section-title&quot;>The Complete Evaluation Flow</h2>
  <p class=&quot;section-lead&quot;>Before filling any column, understand the sequence of decisions. Each stage gates the next.</p>

  <div class=&quot;flow&quot;>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>1</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Set Up TBA Header</div>
        <div class=&quot;fc-sub&quot;>Record Tender No., Name of Work, Bid Submission End Date (original), ARC/Non-ARC type, TBA type (Initial or Final). This determines the qualifying period and whether annualisation is needed.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 4 · Cl. 11 · TBA Row 1–6</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>2</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Record PQC Criteria</div>
        <div class=&quot;fc-sub&quot;>Fill in the Similar Nature definition, value slabs for 1/2/3 works, ATO requirement, and qualifying period dates (Last 7 years from original bid submission date).</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 11.1 · 11.2 · 11.3</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>3</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Enter Bidder Work Order Details</div>
        <div class=&quot;fc-sub&quot;>For each bidder, record all submitted WOs: WO number, date, job description, owner/end-user, WO value (incl. GST).</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 11.2 · Cl. 24.iii.B</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>4</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Check Similar Nature</div>
        <div class=&quot;fc-sub&quot;>Does the WO match the similar nature definition as written in NIT Cl. 11.3 of the specific tender? Every tender defines similar nature differently — always read the exact definition before evaluating. Mark Yes/No with justification.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 11.3</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>5</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Verify Completion Certificate</div>
        <div class=&quot;fc-sub&quot;>Is a completion certificate submitted by the end-client? Does it show executed value, date of completion, and reference WO number? Check for sub-contract approval if applicable.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 24.iii.B(b)</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>6</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Enter Executed Value &amp;amp; Check PQC Slab</div>
        <div class=&quot;fc-sub&quot;>Use executed value (NOT WO value) from the completion certificate. Compare against PQC slabs (1 job ≥ SWO slab for 1 job / 2 jobs / 3 jobs as per NIT Cl. 11.2). All values inclusive of GST.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 11.2 · Cl. 24.iii.B(j)</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>7</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Calculate Annualised Value (if ARC)</div>
        <div class=&quot;fc-sub&quot;>For ARC (Annual Rate Contract) tenders, annualise the executed value to a yearly equivalent if the job duration was not 12 months. For Non-ARC / One-Time tenders, annualisation is not required — enter executed value directly or mark N/A as per the specific TBA format instructions.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 21 · TBA General Note 4 &amp;amp; 6</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>8</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Check Deviations, Additional PQC &amp;amp; Other Requirements</div>
        <div class=&quot;fc-sub&quot;>Note any deviations to GCC/SCC — most NITs do not permit deviations; check the specific NIT. Check Additional Tech PQC as per Cl. 12 of the NIT (may or may not be applicable). Verify ATO documents, PF code, ESI, PAN, GSTIN etc. as required by the tender.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 12 · Cl. 23.e · Cl. 14</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>9</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Record Remarks &amp;amp; Raise Queries</div>
        <div class=&quot;fc-sub&quot;>Document any queries to be raised, deficiencies found, or reasons for rejection. This column is the formal record — must be specific, clause-referenced, and unambiguous.</div>
        <div class=&quot;fc-clause&quot;>NIT Cl. 24.vii · Cl. 24.xviii</div>
      </div>
    </div>
    <div class=&quot;flow-step&quot;>
      <div class=&quot;flow-left&quot;><div class=&quot;flow-circle&quot;>10</div><div class=&quot;flow-line&quot;></div></div>
      <div class=&quot;flow-content&quot;>
        <div class=&quot;fc-title&quot;>Give Final Recommendation</div>
        <div class=&quot;fc-sub&quot;>Mark each bidder as Accepted / Rejected / Query. Count technically acceptable bids. Obtain Prepared By / Checked By / Approved By (DGM-C) signatures as per IWPM Cl. 4.3.1 + R&amp;R Cl. 20(viii).</div>
        <div class=&quot;fc-clause&quot;>TBA Header · NIT Cl. 22</div>
      </div>
    </div>
  </div>
</section>

<!-- ═══ STEP-BY-STEP EVALUATION ═══ -->

<!-- STEP A: HEADER -->
<section id=&quot;step-header&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step A · Evaluator Tool — Tender Configuration</div>
  <h2 class=&quot;section-title&quot;>Tender Configuration — Start Here</h2>
  <p class=&quot;section-lead&quot;>The first screen in the TBA Evaluator is <strong>Tender Configuration</strong> (⚙ in the sidebar). Fill this completely before touching anything else — every subsequent calculation depends on these values.</p>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to fill Tender Configuration</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Tender Number</strong> — Copy verbatim from the tender portal or NIT cover page (e.g., IOCL/GD/MECH/2024/TUR-001). The sidebar chip at the top updates live as you type.</li>
      <li><strong>TBA Type</strong> — Select <em>Initial TBA</em> for the first evaluation, <em>Final TBA</em> after query replies are received, or <em>TR-2</em> if applicable.</li>
      <li><strong>Name of Work</strong> — Copy verbatim from NIT Cl. 3. Do not abbreviate. The tool uses this in all exports and the printed TBA.</li>
      <li><strong>ARC / Non-ARC</strong> — Read NIT Cl. 21. Select <em>Non-ARC / One-Time Job</em> for single-assignment contracts or <em>ARC — Annual Rate Contract</em> for recurring work. This controls whether annualisation fields appear in the bid evaluator.</li>
      <li><strong>Critical Job?</strong> — Select Yes if NIT Cl. 22 applies (no relaxation permitted for critical jobs).</li>
      <li><strong>Sub-contracting Permitted?</strong> — Select as per NIT Cl. 23.i. This controls whether sub-contract approval fields are shown during bid evaluation.</li>
      <li><strong>Original Bid Submission End Date</strong> — Enter the original date from the NIT, even if the bid date was later extended. The tool auto-calculates the qualifying period from this date per Cl. 11.2 Note 2.</li>
      <li><strong>Extended Bid Date</strong> — Enter for reference only. The tool will show a warning if this differs from the original date, reminding you the QP is calculated from the original.</li>
    </ol>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot;>💡 Auto-Calculated Fields</div>
    <p>Once you enter the Original Bid Submission End Date, the <strong>Qualifying Period FROM</strong> and <strong>TO</strong> fields fill automatically (7 years back). These appear as blue computed boxes — you cannot edit them directly, which prevents accidental changes.</p>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-2&quot;>Why the original bid submission date matters</div>
    <p>NIT Cl. 11.2 Note 2 states that in case of extended bid submission date, the original date shall be considered for computing the qualifying period. Using the original date prevents bidders from benefiting from extensions to bring in older work orders that would otherwise fall outside the 7-year window.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-3&quot;>Cl. 11.2 Note 2</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-3&quot;><strong>In case of extended bid submission date, original bid submission date shall be considered</strong> for computing the qualifying period for experience criteria.</div>
  </div>

  <button class=&quot;mar-btn&quot; data-section=&quot;step-header&quot; onclick=&quot;markRead(this,'step-header')&quot;><span class=&quot;mar-icon&quot;>○</span> Mark as Read</button>
  <div class=&quot;section-read-badge&quot;>✓</div>
</section>

<!-- STEP B: PQC CRITERIA -->
<section id=&quot;step-pqc-criteria&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step B · Evaluator Tool — PQC Criteria Screen</div>
  <h2 class=&quot;section-title&quot;>Setting the PQC Criteria</h2>
  <p class=&quot;section-lead&quot;>Navigate to <strong>📋 PQC Criteria</strong> in the sidebar. Fill this screen completely before adding any bidders — it establishes the benchmark that all bids will be measured against.</p>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to fill PQC Criteria in the tool</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Similar Nature of Work</strong> — Copy the exact definition verbatim from NIT Cl. 11.3 of the specific tender. Every tender defines this differently based on scope. The tool stores this text and references it in the final TBA output.</li>
      <li><strong>SWO Slab — 1 Job</strong> — Enter the minimum executed value required for a single qualifying work order (Option 1), from NIT Cl. 11.2. Enter in ₹ Lacs inclusive of GST.</li>
      <li><strong>SWO Slab — 2 Jobs</strong> — Minimum per-WO value when a bidder submits two qualifying works (Option 2). Both must individually meet this threshold.</li>
      <li><strong>SWO Slab — 3 Jobs</strong> — Minimum per-WO value when a bidder submits three qualifying works (Option 3). All three must individually meet this threshold.</li>
      <li><strong>Additional Tech PQC (Cl. 12)</strong> — Check NIT Cl. 12. Enter the requirement verbatim if applicable, or mark N/A. The tool carries this into per-bidder evaluation.</li>
      <li><strong>ATO Requirement</strong> — Enter any Annual Turnover requirement from the NIT, if applicable.</li>
    </ol>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-3&quot;>Why fill criteria BEFORE adding bidders</div>
    <p>Recording the PQC benchmark first creates an objective standard that was pre-determined — not one adjusted after seeing what bidders submitted. This is critical if the TBA is later reviewed by vigilance, auditors, or in legal proceedings.</p>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-1&quot;>⚠️ Common Mistake</div>
    <p>Evaluators sometimes set only one slab and overlook Options 2 and 3. A bidder qualifies if they satisfy <em>any one</em> of the three SWO options. The tool auto-checks all three options for each bidder — but the slabs must be entered correctly first.</p>
  </div>

  <button class=&quot;mar-btn&quot; data-section=&quot;step-pqc-criteria&quot; onclick=&quot;markRead(this,'step-pqc-criteria')&quot;><span class=&quot;mar-icon&quot;>○</span> Mark as Read</button>
  <div class=&quot;section-read-badge&quot;>✓</div>
</section>


<!-- STEP C: WORK ORDER DETAILS -->
<section id=&quot;step-wo&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step C · Evaluate Bids — Work Order Details</div>
  <h2 class=&quot;section-title&quot;>Recording Work Order Details</h2>
  <p class=&quot;section-lead&quot;>For each bidder, the evaluator must capture every work order they have submitted — whether qualifying or not. The approach differs depending on technical acceptance or rejection.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-4&quot;>Why capture all WOs — even non-qualifying ones for rejected bidders</div>
    <p>TBA General Note 2 states: <em>&quot;In case of technical rejection, details of all submitted work orders to be given along with reason for rejection.&quot;</em> This ensures the rejection is defensible — showing that the evaluator reviewed everything submitted, not just the convenient ones.</p>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to fill Work Order Details</div>
    <ol class=&quot;step-list&quot;>
      <li>Write the WO number and issue date exactly as on the document — do not paraphrase.</li>
      <li>Summarise the <strong>Job Description</strong> concisely — focus on the nature of work (shutdown, maintenance type, equipment type) and the client's plant/industry. This is what gets compared to the Similar Nature definition.</li>
      <li>Record the <strong>Owner / End User</strong> — for sub-contract works, this is critical. The owner must have been informed about the sub-contracting (NIT Cl. 24.iii.B(b)(3)).</li>
      <li>Enter the <strong>WO Value (incl. GST)</strong> from the face of the Work Order. Note: this is NOT the value used for PQC evaluation — see Step F for Executed Value. But it is recorded for reference and completeness.</li>
    </ol>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-4&quot;>Cl. 24.iii B(b)(1)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-4&quot;>For fulfilling experience criteria, valid proof includes: <strong>Purchase/Work Order copy with Schedule of Rates/Scope of Works</strong> AND Completion Certificate by end client.</div>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-2&quot;>⚠️ Watch Out</div>
    <ul>
      <li>If a WO was issued more than 7 years ago but the completion date falls within the last 7 years, it IS eligible (NIT Cl. 24.iii.B(a): &quot;irrespective of work order issue date&quot;).</li>
      <li>WO value in foreign currency must be converted to INR at SBI bill selling rate on the date of WO issue (NIT Cl. 24.iii.B(n)).</li>
      <li>A WO executed by a bidder for their <strong>own plant/projects</strong> is NOT counted as experience (NIT Cl. 24.iii.B(l)).</li>
    </ul>
  </div>
</section>

<!-- STEP D: SIMILAR NATURE -->
<section id=&quot;step-similar&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step D · Evaluate Bids — Similar Nature Check</div>
  <h2 class=&quot;section-title&quot;>The Similar Nature Check — The Heart of the TBA</h2>
  <p class=&quot;section-lead&quot;>This single column — Yes or No — is arguably the most important judgment call in the entire evaluation. It requires the evaluator to compare the bidder's submitted WO against the NIT's defined scope. The definition changes with every tender — your judgment must be anchored to the specific NIT in front of you.</p>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-5&quot;>Cl. 11.3</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-5&quot;>NIT Cl. 11.3 defines similar nature of work specific to each tender. <strong>Always read Cl. 11.3 of the NIT you are evaluating verbatim</strong> before assessing any bidder's WO. The definition typically specifies: the type of activity (e.g., shutdown, turnaround, maintenance), the type of equipment or scope (e.g., heat exchangers, vessels, piping, electrical equipment), and the industry or plant type where the work must have been performed. All three components are usually mandatory.</div>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-2&quot;>💡 Illustrative Example of a Similar Nature Definition</div>
    <p>For a mechanical shutdown tender at a refinery, a typical Cl. 11.3 might read: <em>&quot;Turnaround or Shutdown jobs including maintenance of heat exchangers, Columns/Vessels, Furnace, hot job works including CS/SS/AS piping in any petroleum refinery / Petrochemical Plants / Hydrocarbon Fertilizers / Hydrocarbon Industry.&quot;</em> Notice it specifies activity type + equipment type + industry. Your specific NIT will have its own definition — which may differ significantly for civil, electrical, or instrumentation tenders.</p>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>Universal 4-Point Checklist for Any &quot;Similar Nature&quot; Definition</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Activity Type:</strong> Does the bidder's WO involve the type of activity specified in Cl. 11.3 (e.g., shutdown, turnaround, annual maintenance, civil construction)? Read the WO scope — don't rely on the WO title alone.</li>
      <li><strong>Scope / Equipment / Work Type:</strong> Does the WO scope include the specific equipment, system, or work type listed in the definition? If the definition says &quot;including,&quot; even one qualifying element in a broader scope can satisfy this — but confirm it is substantive, not incidental.</li>
      <li><strong>Industry / Plant Type:</strong> Is the job site the type of industry listed in Cl. 11.3? This is often the most critical filter. A job type that matches but was performed at a non-qualifying industry cannot be accepted — industry type is not interchangeable by analogy.</li>
      <li><strong>Verifiability from Submitted Documents:</strong> Can all of the above be confirmed from the WO copy, Schedule of Rates / Scope of Works, and/or Completion Certificate? Do not infer from the bidder's company name, reputation, or verbal claims. Evidence must be in the documents.</li>
    </ol>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-5&quot;>Why is Similar Nature defined so specifically in every NIT?</div>
    <p>The similar nature definition ensures the contractor has hands-on experience with the <em>specific type of work, equipment, and environment</em> being contracted — not just generic industrial experience. For high-hazard environments, this is fundamentally a safety and technical competence requirement. For specialised civil or electrical work, it ensures familiarity with plant-specific constraints. The NIT drafter tailors the definition to match the actual risk and skill profile of the job — which is why it varies from tender to tender.</p>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-3&quot;>⚠️ Common Errors in Similar Nature Assessment</div>
    <ul>
      <li><strong>Using a definition from a previous tender</strong> — Similar nature is defined freshly in each NIT. Never carry over the definition from the last tender you evaluated, even if the scope looks similar.</li>
      <li><strong>Inferring industry type from company name alone</strong> — A company named &quot;XYZ Refinery Services&quot; may have done work at a textile plant. Always verify the client/plant name from the WO or CC.</li>
      <li><strong>Accepting a WO because the value is high</strong> — Value does not determine similar nature. A ₹1,000 Lacs WO at a non-qualifying industry does not meet similar nature. A ₹50 Lacs WO at a qualifying plant does (subject to value thresholds separately).</li>
      <li><strong>Rejecting a WO because the bidder was a sub-contractor</strong> — Sub-contract work is acceptable for PQC per Cl. 11.2 and Cl. 24.iii.B, subject to the required sub-contract approval documentation being submitted.</li>
    </ul>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-3&quot;>💡 Evaluator Tip</div>
    <p>When in doubt about similar nature, refer back to the WO scope of work document (Schedule of Rates/Scope). The nature of the plant is usually mentioned in the client name or project title. If still unclear, raise a query (don't reject outright on first evaluation — see Step K).</p>
  </div>
</section>

<!-- STEP E: COMPLETION CERTIFICATE -->
<section id=&quot;step-cc&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step E · Evaluate Bids — Completion Certificate</div>
  <h2 class=&quot;section-title&quot;>Verifying the Completion Certificate</h2>
  <p class=&quot;section-lead&quot;>The Completion Certificate (CC) is the single most important supporting document for experience. Without it, the work order — however impressive — cannot be used for qualifying.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-6&quot;>Why is CC mandatory?</div>
    <p>The NIT requires the <strong>executed value</strong> for PQC evaluation — not the WO value. The only document that certifies what was actually executed (and at what value) is the Completion Certificate from the end-client or EIC. It also confirms that the job was completed within the qualifying period. Without the CC, the WO is an intention — not evidence of completion.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-6&quot;>Cl. 24.iii B(b)(2)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-6&quot;><strong>Completion certificate by end client</strong> with <em>executed value</em>, date of completion of the job and reference work order number — is required as valid proof of experience.</div>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>What must a valid Completion Certificate contain?</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Executed Value</strong> — the actual amount paid/certified for the work, inclusive of GST. If not explicitly stated, treat as per Cl. 24.iii.B(j) — see Step F.</li>
      <li><strong>Date of Completion</strong> — must fall within the qualifying period (last 7 years from original bid submission date).</li>
      <li><strong>Reference Work Order Number</strong> — to link CC to the WO submitted.</li>
      <li><strong>Issued by end-client / EIC</strong> — not by the bidder themselves, or an affiliated entity.</li>
    </ol>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-4&quot;>⚠️ Sub-Contract Work — Additional Requirements</div>
    <ul>
      <li>If WO is from main contractor (not end-client), the bidder must ALSO submit: Certificate from the <strong>end-user/owner</strong> confirming they were informed about or permitted the sub-contracting (NIT Cl. 24.iii.B(b)(3)).</li>
      <li>CC can also be from end-user / owner / main contractor / owner's consultant acting as EIC (Cl. 24.iii.B(b)(4)).</li>
      <li>If CC value is ambiguous about GST inclusion, it is treated as <strong>inclusive of GST</strong> after seeking clarification (Cl. 24.iii.B(j)).</li>
    </ul>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-7&quot;>Cl. 24.iii B(k)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-7&quot;>The CC shall separately indicate the <strong>Service Tax / GST amount</strong> included in the value, OR a separate certificate from the client mentioning the tax amount shall be submitted.</div>
  </div>
</section>

<!-- STEP F: EXECUTED VALUE -->
<section id=&quot;step-executed-value&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step F · Evaluate Bids — Executed Value</div>
  <h2 class=&quot;section-title&quot;>The Executed Value — The Evaluation Currency</h2>
  <p class=&quot;section-lead&quot;>This is the column that decides whether a bidder meets the PQC or not. Understanding exactly what goes here — and what doesn't — is essential.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-7&quot;>Why Executed Value — not WO Value?</div>
    <p>Consider this: a WO may be for ₹600 Lacs but only ₹310 Lacs worth of work may have actually been completed and certified — falling short of the PQC threshold despite the impressive WO value. Conversely, a WO may be for ₹300 Lacs but scope additions and Variation Orders could mean ₹520 Lacs was actually executed — qualifying the bidder even though the WO face value appeared insufficient. <em>(These figures are illustrative only — always use the actual values from the specific NIT.)</em> The principle is universal: only the executed, certified value counts. This reflects actual demonstrated capability, not contractual intent.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-8&quot;>Cl. 11.2 Note 3 &amp;amp; TBA Note 3</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-8&quot;><strong>The Executed Value of completed work submitted by the bidder shall be considered during evaluation for experience criteria of PQC.</strong></div>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-9&quot;>TBA Note 4</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-9&quot;><strong>Only the executed value matching the Similar Nature of job shall be entered.</strong> If a WO covers both similar and non-similar scope, only the similar-nature portion's executed value should be considered.</div>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to enter Executed Value correctly</div>
    <ol class=&quot;step-list&quot;>
      <li>Read the executed value from the Completion Certificate — not from the WO or invoice.</li>
      <li>Confirm the value is inclusive of GST. If the CC says &quot;ex-GST&quot; or is silent, ask for clarification per Cl. 24.iii.B(j). Until clarified, treat the stated amount as inclusive of GST.</li>
      <li>If the WO is composite (similar + non-similar scope), enter only the value attributable to the similar-nature portion. Ask the bidder for a breakdown if not clearly segregated.</li>
      <li>Compare the entered executed value against the applicable PQC slab and record whether it qualifies.</li>
    </ol>
  </div>

  <table class=&quot;data-table&quot;>
    <thead><tr><th>PQC Option</th><th>No. of Works</th><th>Required Exec. Value Each (₹ Lacs, incl. GST)</th><th>How to Check</th></tr></thead>
    <tbody>
      <tr><td>Option A</td><td>1 work</td><td>≥ X (as per NIT)</td><td>Single qualifying WO executed value ≥ X (as per NIT)</td></tr>
      <tr><td>Option B</td><td>2 works</td><td>≥ Y each (as per NIT)</td><td>Both qualifying WOs each ≥ Y (2-job slab from NIT)</td></tr>
      <tr><td>Option C</td><td>3 works</td><td>≥ Z each (as per NIT)</td><td>All three qualifying WOs each ≥ Z (3-job slab from NIT)</td></tr>
    </tbody>
  </table>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-5&quot;>⚠️ Critical Pitfall</div>
    <p>Do NOT add up values across WOs to meet a single slab. If a bidder claims the 1-job option, ONE single WO's executed value must independently meet that slab. You cannot combine two WOs of ₹X and ₹Y to reach the 1-job slab value. Each option is evaluated independently and the bidder must satisfy all conditions of that option with the WOs submitted under it.</p>
  </div>
</section>

<!-- STEP G: ANNUALISED VALUE -->
<section id=&quot;step-annual&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step G · Evaluate Bids — Annualised Value</div>
  <h2 class=&quot;section-title&quot;>Annualised Value — When and Why</h2>
  <p class=&quot;section-lead&quot;>The annualised value column exists for ARC/AMC type tenders. Understanding when to use it (and when not to) is important for this specific tender.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-8&quot;>What is Annualisation and why does it exist?</div>
    <p>An Annual Rate Contract (ARC) runs for 1–3 years. If a bidder's past ARC experience ran for 3 years and generated ₹900 Lacs total, that's ₹300 Lacs per year. Comparing the total ₹900 Lacs against a benchmark set for a 1-year ARC would be unfair to bidders with shorter ARCs. Annualisation normalises all values to a per-year basis for fair comparison.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-10&quot;>Cl. 21</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-10&quot;>Whether the tendered job is ARC/AMC: <strong>One-Time</strong>. [If ARC/AMC job, work experience value submitted by the bidder shall be annualised.]</div>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-11&quot;>TBA Note 6</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-11&quot;><strong>If nature of tendered job is an ARC/AMC as per NIT, Annualized Executed Value is to be considered for evaluation.</strong></div>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-4&quot;>💡 For This Tender ([Tender No.])</div>
    <p>Since this is a <strong>One-Time (Non-ARC)</strong> job, annualisation is NOT required for the tendered job. However, if a bidder submits an ARC-type past work order as their experience, the evaluator should <strong>annualise that past WO's executed value</strong> before comparing to the PQC slab. The non-ARC experience submitted by a bidder for jobs more than one year duration also needs to be annualised for ARC-type tenders — but not for this One-Time tender.</p>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to calculate Annualised Value (for ARC past WOs, if applicable)</div>
    <ol class=&quot;step-list&quot;>
      <li>Find the total executed value (from CC) and the actual duration of the contract in months.</li>
      <li>Formula: Annualised Value = (Executed Value ÷ Actual Duration in months) × 12</li>
      <li>Enter this annualised figure in the &quot;Annualised Value&quot; column.</li>
      <li>For this One-Time tender: enter the executed value directly, or mark N/A in the annualised column.</li>
    </ol>
  </div>
</section>

<!-- STEP H: SUB-CONTRACT -->
<section id=&quot;step-subcontract&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step H · Evaluate Bids — Sub-Contracting Check</div>
  <h2 class=&quot;section-title&quot;>Sub-Contracting Documentation Check</h2>
  <p class=&quot;section-lead&quot;>When a bidder submits experience from work done as a sub-contractor (not as the main contractor for the end-client), additional documentation is mandatory.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-9&quot;>Why is sub-contract documentation a separate check?</div>
    <p>IOCL needs assurance that the bidder's past sub-contract work was legitimate — i.e., the end-client was aware of and sanctioned the sub-contracting. Without this, a bidder could claim experience from work they participated in informally, without proper engagement. The sub-contract approval/intimation certificate bridges the gap between the main contractor's WO and the end-client's knowledge of the actual executing party.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-12&quot;>Cl. 24.iii B(b)(3)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-12&quot;>In case of sub-contract works, the bidder must submit a <strong>certificate from the end user / Owner / Consultant</strong> stating that the main contractor has intimated them about the engagement of sub-contracting OR that the bidder was allowed/permitted as a sub-contractor.</div>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-13&quot;>Cl. 23.i</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-13&quot;><strong>Sub-Contracting: Not permitted in this job.</strong> Note: this is about sub-contracting within the CURRENT tender — not about past experience as a sub-contractor, which is still accepted for PQC.</div>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-6&quot;>⚠️ Don't Confuse These Two</div>
    <ul>
      <li><strong>Past sub-contract experience:</strong> Acceptable for PQC, but requires approval/intimation certificate (Cl. 24.iii.B(b)(3) &amp;amp; (4)).</li>
      <li><strong>Sub-contracting in current tender:</strong> Absolutely NOT permitted (Cl. 23.i). Any bid indicating a sub-contracting arrangement for the awarded work is liable for rejection.</li>
    </ul>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>Filling this column</div>
    <ol class=&quot;step-list&quot;>
      <li>If the bidder's WO is directly from the end-client: mark &quot;N/A&quot; — no sub-contract approval needed.</li>
      <li>If WO is from a main contractor (not end-client): mark &quot;Yes&quot; if approval/intimation certificate is submitted, &quot;No&quot; if missing. A &quot;No&quot; here means the sub-contract WO cannot be used for PQC — raise a query or reject.</li>
      <li>For JV/Consortium work: also check the JV agreement and that the work order/CC is in the name of the JV or Leader with bidder's details mentioned (Cl. 24.iii.B(d)).</li>
    </ol>
  </div>
</section>

<!-- STEP I: DEVIATIONS -->
<section id=&quot;step-deviations&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step I · Evaluate Bids — Deviations</div>
  <h2 class=&quot;section-title&quot;>Checking for Deviations</h2>
  <p class=&quot;section-lead&quot;>Deviations are conditions or modifications a bidder has put in their techno-commercial bid that differ from what the NIT/GCC/SCC specifies.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-10&quot;>Why deviations must be checked in TBA</div>
    <p>IOCL needs to know upfront if a bidder is willing to accept the full contractual terms. A deviation on a critical commercial or safety clause discovered after award creates disputes and potential losses. The TBA flags deviations so they can be resolved — or the bid rejected — before the price bid is opened.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-14&quot;>Cl. 23.e</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-14&quot;><strong>No deviation to GCC/SCC is permitted in this tendered job.</strong></div>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-15&quot;>Cl. 24.v B(c)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-15&quot;>Bid is liable for rejection if the bidder <strong>stipulates his own conditions and refuses to withdraw them.</strong></div>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to handle deviations</div>
    <ol class=&quot;step-list&quot;>
      <li>Review the bidder's techno-commercial bid for any conditions, caveats, or modifications to GCC/SCC terms.</li>
      <li>If deviation found: record it specifically in the Deviations column (e.g., &quot;Bidder has sought deviation on defect liability period&quot;).</li>
      <li>Since no deviation is permitted (Cl. 23.e), raise a query asking the bidder to unconditionally withdraw the deviation.</li>
      <li>If the bidder refuses to withdraw in query reply: recommend rejection citing Cl. 24.v.B(c).</li>
      <li>If no deviations: write <strong>&quot;NIL&quot;</strong> — never leave blank, as blank implies the column was not checked.</li>
    </ol>
  </div>
</section>

<!-- STEP J: ADDITIONAL PQC -->
<section id=&quot;step-addl-pqc&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step J · Evaluate Bids — Additional Tech PQC</div>
  <h2 class=&quot;section-title&quot;>Additional Technical PQC Check</h2>
  <p class=&quot;section-lead&quot;>Some tenders have additional technical requirements beyond the standard ATO and SWO criteria — for example, specific certifications, equipment ownership, or key personnel qualifications.</p>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-16&quot;>Cl. 12</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-16&quot;>Additional Technical Requirement (PQC), if any: <strong>Not Applicable</strong></div>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-5&quot;>💡 For This Tender</div>
    <p>Always check Cl. 12 of the specific NIT being evaluated. If it says &quot;Not Applicable,&quot; mark this column as <strong>&quot;N/A&quot;</strong> for all bidders — never leave blank. In tenders where Addl. PQC is applicable (e.g., specific equipment ownership, key personnel qualifications, ISO certifications), this column becomes a pass/fail gate and must be evaluated rigorously for each bidder.</p>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-11&quot;>Why this column exists even when N/A</div>
    <p>The TBA format is a universal document used across all IOCL tenders. By always having this column, evaluators are forced to actively check the NIT for any additional requirements rather than assuming there are none. The N/A entry is an affirmative confirmation, not an omission.</p>
  </div>
</section>

<!-- STEP K: REMARKS -->
<section id=&quot;step-remarks&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step K · Evaluate Bids — Remarks</div>
  <h2 class=&quot;section-title&quot;>Remarks — The Most Important Column to Write Well</h2>
  <p class=&quot;section-lead&quot;>The Remarks column is where the evaluator's professional judgment is documented. A vague remark is almost as bad as no remark. Here's how to write remarks that stand up to scrutiny.</p>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot; data-cms-id=&quot;rationale-label-12&quot;>Why Remarks must be specific and clause-referenced</div>
    <p>The TBA is a legal document. If a rejected bidder challenges the decision — through court, arbitration, or CVC inquiry — the Remarks column is the evaluator's primary defence. Generic remarks like &quot;does not meet PQC&quot; are insufficient. Specific remarks like &quot;Executed value of ₹[___] Lacs (from CC dated [date]) is below the required ₹[Z] Lacs for 3-work option as per NIT Cl. 11.2&quot; are defensible.</p>
  </div>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to write good Remarks</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>For Accepted bidders:</strong> Note the qualifying WO(s) and the specific PQC option met (e.g., &quot;Qualifies under 2-job option: WO#1 executed value ₹[___]L and WO#2 executed value ₹[___]L, both ≥ ₹[Y]L as per Cl. 11.2 Option 2&quot;).</li>
      <li><strong>For Queries:</strong> State specifically what is missing or unclear (e.g., &quot;CC for WO#2 does not mention GST component. Bidder asked to submit revised CC or separate certificate per Cl. 24.iii.B(k)&quot;).</li>
      <li><strong>For Rejected bidders:</strong> State the specific deficiency with values and clause reference (e.g., &quot;Highest executed value of submitted similar WO is ₹[___]L, below ₹[X]L required for 1-job option, and only 1 similar WO submitted — Option B and C not applicable. Offer rejected per Cl. 24.v.A(a)&quot;).</li>
    </ol>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-17&quot;>Cl. 24.vii</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-17&quot;>Offers with <strong>incomplete/irrelevant documents or anomalies are liable for rejection without any communication</strong>. Hence bidders are advised to take utmost care while uploading prequalification documents.</div>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot; data-cms-id=&quot;tip-head-6&quot;>💡 Query vs. Rejection</div>
    <p>Not every deficiency warrants immediate rejection. On Initial TBA, raise a query for: missing documents that could be submitted, unclear values that could be clarified, or ambiguous scope descriptions. Reserve outright rejection for: clear non-fulfillment of PQC values, forged/misrepresented documents, or refusal to withdraw unacceptable conditions.</p>
  </div>
</section>

<!-- STEP L: RECOMMENDATION -->
<section id=&quot;step-recommendation&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step L · Evaluate Bids — Final Recommendation</div>
  <h2 class=&quot;section-title&quot;>The Final Recommendation</h2>
  <p class=&quot;section-lead&quot;>The last column crystallises all preceding evaluation into a single decision: Accepted, Rejected, or Query. This drives everything that happens next.</p>

  <div class=&quot;col-map&quot;>
  <div class=&quot;col-header&quot;><span>Decision</span><span>When to Use &amp;amp; What Happens Next</span></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>ACCEPTED</div><div class=&quot;col-explain&quot;>Bidder meets all PQC criteria: ATO, SWO (under one of the 3 options), similar nature confirmed, CC with executed value verified, no outstanding deviations, all mandatory documents submitted. Price bid of this bidder will be opened.</div></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>REJECTED</div><div class=&quot;col-explain&quot;>Bidder fails to meet one or more mandatory PQC criteria and deficiency is not rectifiable by query/clarification. Price bid will NOT be opened. Must document reason in Remarks column with clause reference.</div></div>
  <div class=&quot;col-row&quot;><div class=&quot;col-field&quot;>QUERY</div><div class=&quot;col-explain&quot;>Bidder's documents are incomplete or ambiguous &amp;mdash; but the deficiency could potentially be resolved by seeking clarification. Issue the query, re-evaluate on Final TBA after replies. Move to Accepted or Rejected on Final TBA.</div></div>
  </div>


  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-18&quot;>Cl. 22</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-18&quot;>Job Nature: <strong>Critical.</strong> No relaxation on PQC is allowed to Startup-India registered bidders and MSE bidders. The evaluator cannot use discretion to relax PQC for any bidder in a Critical job.</div>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot; data-cms-id=&quot;pitfall-head-7&quot;>⚠️ Signature &amp;amp; Approval</div>
    <p>The completed TBA must be signed by the evaluator (<strong>Prepared By</strong>), reviewed by a senior officer (<strong>Checked By</strong>), and approved by <strong>DGM (Contracts)</strong> as per IWPM Clause 4.3.1 + R&amp;R Cl. 20(viii). An unsigned TBA has no formal validity and cannot be used as basis for bid opening or rejection communication.</p>
  </div>
</section>

<!-- STEP C: MANAGE BIDDERS -->
<section id=&quot;step-bidders&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step C · Evaluator Tool — Manage Bidders Screen</div>
  <h2 class=&quot;section-title&quot;>Adding &amp;amp; Managing Bidders</h2>
  <p class=&quot;section-lead&quot;>Navigate to <strong>👥 Manage Bidders</strong> in the sidebar. Add one entry for each bid received on the portal. This screen is the roster — evaluation details are entered in the next step.</p>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How to add bidders</div>
    <ol class=&quot;step-list&quot;>
      <li>Click <strong>+ Add Bidder</strong>. A new bidder card appears with a default name.</li>
      <li>Enter the <strong>Bidder Name</strong> exactly as it appears on the tender portal — typically the registered company name.</li>
      <li>Enter the <strong>Bid Reference / Portal ID</strong> if available, for traceability.</li>
      <li>Repeat for every bid received. The total count feeds into the TBA header and the Summary sheet.</li>
      <li>To remove a bidder added in error, use the delete icon on that bidder's card. Note: this also removes all evaluation data for that bidder.</li>
    </ol>
  </div>

  <div class=&quot;tip&quot;>
    <div class=&quot;tip-head&quot;>💡 Bidder Tabs in Evaluate Bids</div>
    <p>Once bidders are added here, they appear as tabs in the <em>Evaluate Bids</em> screen. You can switch between bidders freely — all data is saved in the session automatically.</p>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot;>Why add all bidders — including likely rejections</div>
    <p>TBA General Note 2 requires that details of all submitted work orders be recorded even for technically rejected bidders, with the reason for rejection. Adding every bidder upfront and evaluating each one ensures the final TBA is complete and defensible to audit.</p>
  </div>

  <button class=&quot;mar-btn&quot; data-section=&quot;step-bidders&quot; onclick=&quot;markRead(this,'step-bidders')&quot;><span class=&quot;mar-icon&quot;>○</span> Mark as Read</button>
  <div class=&quot;section-read-badge&quot;>✓</div>
</section>

<!-- STEP D: EVALUATE BIDS -->
<section id=&quot;step-evaluate&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step D · Evaluator Tool — Evaluate Bids Screen</div>
  <h2 class=&quot;section-title&quot;>Evaluating Each Bid</h2>
  <p class=&quot;section-lead&quot;>Navigate to <strong>🔍 Evaluate Bids</strong> in the sidebar. This is the core evaluation screen — use the bidder tabs at the top to switch between bidders. Work through each bidder's Work Orders one by one.</p>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>Evaluation workflow per bidder</div>
    <ol class=&quot;step-list&quot;>
      <li><strong>Select the bidder tab</strong> at the top. Each bidder gets their own independent evaluation workspace.</li>
      <li>Click <strong>+ Add Work Order</strong> for each WO the bidder has submitted. Fill in WO Number, Date, Job Description, Owner/End User, and WO Value (incl. GST).</li>
      <li>For each WO, set <strong>Similar Nature</strong> (Yes / No / Query) based on whether the job description matches the NIT Cl. 11.3 definition you entered in PQC Criteria. Select No with a brief reason if it does not match.</li>
      <li>Set <strong>CC Submitted?</strong> (Yes / No / Query) — whether a valid Completion Certificate from the end-client is present for this WO.</li>
      <li>Enter the <strong>Executed Value (₹ Lacs, incl. GST)</strong> from the CC — not from the WO face value. This is the figure that counts for PQC evaluation.</li>
      <li>If the tender is ARC type, also enter the <strong>Contract Duration (months)</strong> and the tool will auto-calculate the Annualised Value.</li>
      <li>The tool automatically evaluates all three SWO options (1 job / 2 jobs / 3 jobs) using the slabs from PQC Criteria and shows a live verdict: <span style=&quot;color:var(--teal);font-weight:700&quot;>ACCEPTED</span> / <span style=&quot;color:var(--rust);font-weight:700&quot;>REJECTED</span> / <span style=&quot;color:var(--gold);font-weight:700&quot;>QUERY</span>.</li>
      <li>Add any <strong>Remarks</strong> for this bidder — deviations, missing documents, ATO shortfall, etc. These carry into the printed TBA.</li>
    </ol>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot;>⚠️ Executed Value vs WO Value</div>
    <p>Always use the <strong>executed/certified value from the Completion Certificate</strong> — not the WO face value. A WO may be for ₹600 Lacs but only ₹310 Lacs may have been executed. Conversely, variation orders may push actual execution above the WO value. Only the CC-certified amount counts.</p>
  </div>

  <div class=&quot;pitfall&quot;>
    <div class=&quot;pitfall-head&quot;>⚠️ Qualifying Period Check</div>
    <p>The tool auto-checks each WO's completion date against the qualifying period set in Step A. WOs with a completion date outside the 7-year window are flagged automatically — do not include them as qualifying WOs regardless of their value.</p>
  </div>

  <div class=&quot;clause-cite&quot;>
    <div class=&quot;clause-num&quot; data-cms-id=&quot;clause-num-4&quot;>Cl. 24.iii B(a)</div>
    <div class=&quot;clause-text&quot; data-cms-id=&quot;clause-text-4&quot;>Experience criteria WOs are eligible <strong>irrespective of work order issue date</strong> — what matters is the <strong>completion date</strong> falling within the qualifying period.</div>
  </div>

  <button class=&quot;mar-btn&quot; data-section=&quot;step-evaluate&quot; onclick=&quot;markRead(this,'step-evaluate')&quot;><span class=&quot;mar-icon&quot;>○</span> Mark as Read</button>
  <div class=&quot;section-read-badge&quot;>✓</div>
</section>

<!-- STEP E: QUERY REGISTER -->
<section id=&quot;step-queries&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step E · Evaluator Tool — Query Register</div>
  <h2 class=&quot;section-title&quot;>Query Register — Tracking Clarifications</h2>
  <p class=&quot;section-lead&quot;>Navigate to <strong>❓ Query Register</strong> in the sidebar. All queries raised during Evaluate Bids appear here automatically. This screen is your audit trail for the Initial TBA query process.</p>

  <div class=&quot;how-to&quot;>
    <div class=&quot;how-to-title&quot;>How the Query Register works</div>
    <ol class=&quot;step-list&quot;>
      <li>Every WO or field marked <strong>QUERY</strong> in Evaluate Bids auto-generates a query entry here — you do not need to manually add them.</li>
      <li>Each query entry shows the <strong>Bidder Name</strong>, <strong>WO Reference</strong>, <strong>Query Type</strong> (e.g., CC Missing, GST Clarity, Similar Nature Unclear), and the auto-generated <strong>Query Wording</strong> based on the NIT clause.</li>
      <li>You can edit the query wording if needed — the editable text box allows customisation before dispatch.</li>
      <li>Use the <strong>Copy All Queries</strong> button to copy the formatted query text for dispatch in official correspondence or GEM messaging.</li>
      <li>After receiving replies, update the evaluation in Evaluate Bids — change QUERY fields to Yes/No based on the clarification received. This moves the bidder toward a final ACCEPTED or REJECTED verdict on the Final TBA.</li>
    </ol>
  </div>

  <div class=&quot;rationale&quot;>
    <div class=&quot;rationale-label&quot;>What a query can and cannot do</div>
    <p>A query can seek clarification on documents already submitted — e.g., whether a CC value is inclusive of GST, or whether a job description matches similar nature. A query <strong>cannot</strong> ask a bidder to submit new experience WOs not included in the original bid, or correct a substantive PQC shortfall. The evaluation is based on what was submitted at bid closure.</p>
  </div>

</section>

<!-- STEP F: TBA SUMMARY -->
<section id=&quot;step-summary&quot; class=&quot;section&quot;>
  <div class=&quot;section-eyebrow&quot;>Step F · Evaluator Tool — TBA Summary &amp;amp; Format Preview</div>
  <h2 class=&quot;section-title&quot;>TBA Summary &amp;amp; Format Preview</h2>
  <p class=&quot;section-lead&quot;>Navigate to <strong>📊 TBA Summary</strong> and <strong>📄 TBA Format Preview</strong> in the sidebar. These screens provide a consolidated view of all evaluation decisions and a print-ready version of the full TBA.</p>

  <div class=&quot;how-to&quot;>

      <li>The Summary screen shows one row per bidder with their overall verdict: Accepted, Rejected, or Query. Check this after evaluating all bidders to get a bird's-eye view before export.</li>
